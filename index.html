
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>8ボールビリヤード（WPA準拠ベース）</title>
<style>
  :root{
    --bg1:#08111d;
    --bg2:#132640;
    --panel:rgba(10,18,30,.88);
    --line:rgba(255,255,255,.12);
    --text:#eef6ff;
    --muted:#aec0d4;
    --good:#7ef0b7;
    --bad:#ff9d9d;
    --accent:#87d9ff;
    --table:#1e6b40;
    --table2:#144a2b;
    --rail:#6e4a24;
    --wood:#8a5a2b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;color:var(--text);background:radial-gradient(circle at top,#27466d 0%,#15253b 35%,#09111f 100%)}
  .app{display:grid;grid-template-columns:minmax(320px,360px) 1fr;gap:14px;padding:14px;width:100%;height:100%}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;backdrop-filter:blur(10px);box-shadow:0 18px 45px rgba(0,0,0,.35)}
  .sidebar{padding:18px;display:flex;flex-direction:column;gap:12px;min-height:0}
  h1{margin:0;font-size:28px;line-height:1.1}
  .subtitle{font-size:13px;color:var(--muted);line-height:1.65}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
  .label{font-size:12px;color:var(--muted);margin-bottom:4px}
  .value{font-size:24px;font-weight:800}
  .section{padding:14px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07)}
  .sectionTitle{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;font-weight:700}
  .statusBox{line-height:1.7;font-size:14px}
  .buttons{display:flex;flex-wrap:wrap;gap:8px}
  button{appearance:none;border:none;border-radius:14px;padding:12px 14px;background:linear-gradient(180deg,#8de4ff,#50bbff);color:#031625;font-weight:800;cursor:pointer;box-shadow:0 8px 22px rgba(80,187,255,.24)}
  button.alt{background:rgba(255,255,255,.08);color:var(--text);box-shadow:none;border:1px solid rgba(255,255,255,.08)}
  button:disabled{opacity:.4;cursor:not-allowed}
  ul.help{margin:0;padding-left:18px;color:var(--muted);line-height:1.7;font-size:13px}
  .gameWrap{position:relative;min-width:0}
  canvas{width:100%;height:100%;display:block;border-radius:22px}
  .toast,.decision{
    position:absolute;left:50%;transform:translateX(-50%);
    background:rgba(7,12,22,.95);border:1px solid rgba(255,255,255,.12);
    box-shadow:0 12px 32px rgba(0,0,0,.35)
  }
  .toast{top:18px;padding:10px 16px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:.22s}
  .toast.show{opacity:1}
  .decision{top:50%;transform:translate(-50%,-50%);padding:18px;border-radius:20px;width:min(480px,calc(100% - 28px));display:none}
  .decision.show{display:block}
  .decisionTitle{font-weight:800;font-size:20px;margin-bottom:6px}
  .decisionText{color:var(--muted);line-height:1.65;font-size:14px;margin-bottom:12px}
  .decisionButtons{display:grid;grid-template-columns:1fr;gap:8px}
  .footerNote{font-size:12px;color:var(--muted);line-height:1.65}
  .chipRow{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:12px}
  .netField{width:100%;padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:var(--text);font:inherit}
  .netField::placeholder{color:rgba(255,255,255,.42)}
  textarea.netField{min-height:96px;resize:vertical}
  input.netField{height:44px}
  .mini{font-size:12px;color:var(--muted);line-height:1.5}
  @media (max-width: 980px){
    .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .sidebar{max-height:46vh;overflow:auto}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar panel">
    <div>
      <h1>8ボールビリヤード</h1>
      <div class="subtitle">引っ張ってショットする 8ボール。ローカル対戦 + 通信対戦対応。</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">手番</div><div class="value" id="turnValue">P1</div></div>
      <div class="stat"><div class="label">状態</div><div class="value" id="stateValue">ブレイク</div></div>
      <div class="stat"><div class="label">P1</div><div class="value" id="p1Value">未定</div></div>
      <div class="stat"><div class="label">P2</div><div class="value" id="p2Value">未定</div></div>
    </div>

    <div class="section">
      <div class="sectionTitle">現在のコール</div>
      <div class="statusBox" id="callText">ブレイクなのでコール不要</div>
      <div class="chipRow" style="margin-top:10px">
        <div class="chip" id="legalHint">白球はヘッドライン内に配置</div>
        <div class="chip" id="rackHint">Rack 1</div>
      </div>
    </div>

    <div class="section">
      <div class="sectionTitle">進行</div>
      <div class="statusBox" id="statusText">P1 のブレイク。白球をヘッドライン内に置いて、引っ張ってショット。</div>
    </div>

    <div class="section">
      <div class="sectionTitle">通信</div>
      <div class="buttons">
        <button id="hostBtn">部屋作成</button>
        <button id="joinBtn" class="alt">参加</button>
        <button id="copyInviteBtn" class="alt">URLコピー</button>
      </div>
      <div class="statusBox" id="netStatus" style="margin-top:10px">オフライン</div>
      <div class="chipRow" style="margin-top:10px">
        <div class="chip" id="roomChip">部屋ID: -</div>
        <div class="chip" id="modeChip">未接続</div>
      </div>
      <input id="inviteUrl" class="netField" style="margin-top:10px" readonly placeholder="招待URL" />
      <input id="roomInput" class="netField" style="margin-top:10px" placeholder="部屋ID" />
      <div class="buttons" style="margin-top:10px">
        <button id="copyRoomBtn" class="alt">IDコピー</button>
        <button id="disconnectBtn" class="alt">切断</button>
      </div>
      <div class="mini" style="margin-top:8px" id="joinHint">URLを送れば参加。ローカルファイルなら部屋IDでも参加。</div>
    </div>

    <div class="section">
      <div class="sectionTitle">操作</div>
      <div class="buttons">
        <button id="newRackBtn">新ラック</button>
        <button id="passCueBtn" class="alt">白球を中央に戻す</button>
        <button id="clearCallBtn" class="alt">コール解除</button>
      </div>
    </div>

    <div class="footerNote">
      球→ポケットを選んでから白球を引っ張って発射。
    </div>
  </aside>

  <main class="gameWrap panel">
    <canvas id="gameCanvas"></canvas>
    <div class="toast" id="toast"></div>
    <div class="decision" id="decisionBox">
      <div class="decisionTitle" id="decisionTitle">選択</div>
      <div class="decisionText" id="decisionText"></div>
      <div class="decisionButtons" id="decisionButtons"></div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const toastEl = document.getElementById('toast');
  const decisionBox = document.getElementById('decisionBox');
  const decisionTitle = document.getElementById('decisionTitle');
  const decisionText = document.getElementById('decisionText');
  const decisionButtons = document.getElementById('decisionButtons');

  const turnValue = document.getElementById('turnValue');
  const stateValue = document.getElementById('stateValue');
  const p1Value = document.getElementById('p1Value');
  const p2Value = document.getElementById('p2Value');
  const callText = document.getElementById('callText');
  const legalHint = document.getElementById('legalHint');
  const rackHint = document.getElementById('rackHint');
  const statusText = document.getElementById('statusText');

  const newRackBtn = document.getElementById('newRackBtn');
  const passCueBtn = document.getElementById('passCueBtn');
  const clearCallBtn = document.getElementById('clearCallBtn');
  const hostBtn = document.getElementById('hostBtn');
  const joinBtn = document.getElementById('joinBtn');
  const copyInviteBtn = document.getElementById('copyInviteBtn');
  const copyRoomBtn = document.getElementById('copyRoomBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const inviteUrl = document.getElementById('inviteUrl');
  const roomInput = document.getElementById('roomInput');
  const roomChip = document.getElementById('roomChip');
  const modeChip = document.getElementById('modeChip');
  const joinHint = document.getElementById('joinHint');
  const netStatus = document.getElementById('netStatus');

  let dpr = Math.max(1, window.devicePixelRatio || 1);
  const TABLE = { x: 64, y: 52, w: 1110, h: 610, rail: 38, pocketR: 28 };
  const BALL_R = 13;
  const HEAD_X = TABLE.x + TABLE.w * 0.26;

  const pockets = [
    { x: TABLE.x + 8, y: TABLE.y + 8 },
    { x: TABLE.x + TABLE.w / 2, y: TABLE.y + 3 },
    { x: TABLE.x + TABLE.w - 8, y: TABLE.y + 8 },
    { x: TABLE.x + 8, y: TABLE.y + TABLE.h - 8 },
    { x: TABLE.x + TABLE.w / 2, y: TABLE.y + TABLE.h - 3 },
    { x: TABLE.x + TABLE.w - 8, y: TABLE.y + TABLE.h - 8 },
  ];

  const numberColors = {
    1:'#f5d547', 2:'#356dff', 3:'#ff5454', 4:'#8a58ff', 5:'#ff9b31', 6:'#26c160', 7:'#7a1313',
    8:'#111111', 9:'#f5d547', 10:'#356dff', 11:'#ff5454', 12:'#8a58ff', 13:'#ff9b31', 14:'#26c160', 15:'#7a1313'
  };

  const state = {
    lastTick: 0,
    balls: [],
    cueBall: null,
    currentPlayer: 0,
    players: [
      { name: 'P1', group: null, wins: 0 },
      { name: 'P2', group: null, wins: 0 }
    ],
    rack: 1,
    breakShot: true,
    openTable: true,
    ballInHand: true,
    inHandMode: 'head',
    draggingAim: false,
    dragPos: { x: 0, y: 0 },
    selectedBall: null,
    selectedPocket: null,
    shotActive: false,
    shotCtx: null,
    particles: [],
    pendingDecision: null,
    gameOver: false,
    statusMessage: ''
  };

  let toastTimer = 0;
  let decisionSeq = 0;
  const decisionActions = new Map();
  const net = {
    mode: 'offline',
    side: 0,
    peer: null,
    conn: null,
    connected: false,
    lastSyncAt: 0,
    roomId: '',
    inviteUrl: ''
  };

  function showToast(text){
    toastEl.textContent = text;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1400);
  }

  function makeBall(num, x, y){
    const isCue = num === 0;
    return {
      num,
      kind: isCue ? 'cue' : 'object',
      group: isCue ? null : (num === 8 ? 'eight' : (num <= 7 ? 'solid' : 'stripe')),
      x, y, r: BALL_R,
      vx: 0, vy: 0,
      alive: true,
      color: isCue ? '#ffffff' : numberColors[num],
      glow: 0
    };
  }

  function rackBalls(){
    state.balls = [];
    const cue = makeBall(0, TABLE.x + TABLE.w * 0.23, TABLE.y + TABLE.h / 2);
    state.cueBall = cue;
    state.balls.push(cue);

    const rackPattern = [
      [1],
      [10, 2],
      [3, 8, 11],
      [12, 5, 13, 6],
      [7, 14, 4, 15, 9]
    ];
    const startX = TABLE.x + TABLE.w * 0.72;
    const startY = TABLE.y + TABLE.h / 2;
    const rowGap = BALL_R * 2 * 0.98;
    const colGap = Math.sqrt(3) * BALL_R * 0.98;

    for (let row = 0; row < rackPattern.length; row++) {
      const nums = rackPattern[row];
      for (let col = 0; col < nums.length; col++) {
        const num = nums[col];
        const x = startX + row * colGap;
        const y = startY + (col - row / 2) * rowGap;
        state.balls.push(makeBall(num, x, y));
      }
    }
  }

  function startRack(breaker = 0){
    state.currentPlayer = breaker;
    state.players[0].group = null;
    state.players[1].group = null;
    state.breakShot = true;
    state.openTable = true;
    state.ballInHand = true;
    state.inHandMode = 'head';
    state.selectedBall = null;
    state.selectedPocket = null;
    state.draggingAim = false;
    state.shotActive = false;
    state.pendingDecision = null;
    state.gameOver = false;
    state.particles.length = 0;
    rackBalls();
    updateHud();
    setStatus(`${player().name} のブレイク。白球をヘッドライン内に置いて、引っ張ってショット。`);
  }

  function player(){ return state.players[state.currentPlayer]; }
  function opponent(){ return state.players[1 - state.currentPlayer]; }
  function switchTurn(reason, ballInHand = false, inHandMode = null){
    state.currentPlayer = 1 - state.currentPlayer;
    state.ballInHand = ballInHand;
    state.inHandMode = ballInHand ? (inHandMode || 'any') : null;
    state.selectedBall = null;
    state.selectedPocket = null;
    updateHud();
    setStatus(`${player().name} の手番。${reason}`);
  }

  function setStatus(text){
    state.statusMessage = text;
    statusText.textContent = text;
  }

  function groupName(group){
    if (group === 'solid') return 'ソリッド';
    if (group === 'stripe') return 'ストライプ';
    return '未定';
  }

  function updateHud(){
    turnValue.textContent = player().name;
    stateValue.textContent = state.breakShot ? 'ブレイク' : (state.openTable ? 'オープン' : '通常');
    p1Value.textContent = `${groupName(state.players[0].group)} / ${state.players[0].wins}`;
    p2Value.textContent = `${groupName(state.players[1].group)} / ${state.players[1].wins}`;
    rackHint.textContent = `Rack ${state.rack}`;
    legalHint.textContent = state.ballInHand
      ? (state.inHandMode === 'head' ? '白球はヘッドライン内に配置' : '白球は自由配置')
      : '通常配置';
    if (state.breakShot) {
      callText.textContent = 'ブレイクなのでコール不要';
    } else if (state.selectedBall && state.selectedPocket != null) {
      callText.textContent = `球 ${state.selectedBall} → ポケット ${state.selectedPocket + 1}`;
    } else {
      callText.textContent = '球とポケットをコールしてください';
    }
  }

  function allStopped(){
    return state.balls.every(b => !b.alive || (Math.abs(b.vx) < 7 && Math.abs(b.vy) < 7));
  }

  function liveBalls(){
    return state.balls.filter(b => b.alive);
  }

  function countRemaining(group){
    return state.balls.filter(b => b.alive && b.kind === 'object' && b.group === group).length;
  }

  function objectBall(num){
    return state.balls.find(b => b.num === num);
  }

  function canCallBall(num){
    const b = objectBall(num);
    if (!b || !b.alive || b.kind !== 'object') return false;
    if (state.breakShot) return false;
    const shooter = player();
    if (state.openTable) {
      if (num === 8) return countRemaining('solid') === 0 || countRemaining('stripe') === 0;
      return true;
    }
    if (shooter.group && countRemaining(shooter.group) > 0) {
      return b.group === shooter.group;
    }
    return num === 8;
  }

  function resetCueToCenter(){
    const cue = state.cueBall;
    cue.x = TABLE.x + TABLE.w * 0.23;
    cue.y = TABLE.y + TABLE.h / 2;
    cue.vx = cue.vy = 0;
    cue.alive = true;
  }

  function resize(){
    const rect = canvas.getBoundingClientRect();
    dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  function worldFromScreen(p){
    const scale = Math.min(canvas.clientWidth / 1280, canvas.clientHeight / 720);
    const ox = (canvas.clientWidth - 1280 * scale) * 0.5;
    const oy = (canvas.clientHeight - 720 * scale) * 0.5;
    return { x: (p.x - ox) / scale, y: (p.y - oy) / scale };
  }

  function beginShotContext(){
    state.shotActive = true;
    state.shotCtx = {
      firstContact: null,
      railAfterContact: false,
      pocketed: [],
      scratch: false,
      breakRailSet: new Set(),
      cueCrossedHead: false,
      startedFromHead: state.inHandMode === 'head'
    };
  }

  function endShotContext(){
    state.shotActive = false;
  }

  function canShootNow(){
    if (state.pendingDecision || state.gameOver) return false;
    if (!allStopped()) return false;
    if (!state.cueBall.alive) return false;
    if (state.breakShot) return true;
    return state.selectedBall != null && state.selectedPocket != null;
  }

  function validCuePlacement(x, y){
    const left = TABLE.x + TABLE.rail + BALL_R;
    const right = TABLE.x + TABLE.w - TABLE.rail - BALL_R;
    const top = TABLE.y + TABLE.rail + BALL_R;
    const bottom = TABLE.y + TABLE.h - TABLE.rail - BALL_R;
    if (x < left || x > right || y < top || y > bottom) return false;
    if (state.inHandMode === 'head' && x > HEAD_X - BALL_R * 0.2) return false;
    for (const p of pockets) {
      if (Math.hypot(x - p.x, y - p.y) < TABLE.pocketR - 3) return false;
    }
    for (const b of state.balls) {
      if (!b.alive || b.kind === 'cue') continue;
      if (Math.hypot(x - b.x, y - b.y) < BALL_R * 2 + 0.5) return false;
    }
    return true;
  }

  function tryPlaceCue(x, y){
    if (!state.ballInHand) return false;
    if (!validCuePlacement(x, y)) return false;
    state.cueBall.x = x;
    state.cueBall.y = y;
    state.cueBall.alive = true;
    state.cueBall.vx = state.cueBall.vy = 0;
    return true;
  }

  function pocketAt(x, y){
    for (let i = 0; i < pockets.length; i++) {
      if (Math.hypot(x - pockets[i].x, y - pockets[i].y) <= TABLE.pocketR + 13) return i;
    }
    return null;
  }

  function ballAt(x, y){
    let hit = null;
    let best = Infinity;
    for (const b of state.balls) {
      if (!b.alive) continue;
      const d = Math.hypot(x - b.x, y - b.y);
      if (d <= b.r + 5 && d < best) {
        best = d;
        hit = b;
      }
    }
    return hit;
  }

  function isOnlineMatch(){
    return net.connected && isConnOpen();
  }

  function isHost(){
    return net.mode === 'host';
  }

  function mySide(){
    return isOnlineMatch() ? net.side : state.currentPlayer;
  }

  function isMyTurn(){
    return !isOnlineMatch() || state.currentPlayer === mySide();
  }

  function canMyDecision(){
    return !!state.pendingDecision && (!isOnlineMatch() || state.pendingDecision.chooser === mySide());
  }

  function analyzeBoardPress(p){
    if (state.pendingDecision || state.gameOver || !allStopped()) return { type: 'none' };

    const pIndex = pocketAt(p.x, p.y);
    if (!state.breakShot && pIndex != null) {
      return { type: 'selectPocket', pocketIndex: pIndex };
    }

    const hit = ballAt(p.x, p.y);
    if (hit && hit.kind === 'object' && canCallBall(hit.num)) {
      return { type: 'selectBall', ballNum: hit.num };
    }

    if (state.ballInHand && (!hit || hit.kind !== 'cue')) {
      return { type: 'placeCue', x: p.x, y: p.y };
    }

    const cue = state.cueBall;
    if (!cue.alive) return { type: 'none' };
    const dCue = Math.hypot(p.x - cue.x, p.y - cue.y);
    if (dCue <= cue.r + 8) {
      if (!canShootNow()) return { type: 'blocked' };
      return { type: 'aim', x: p.x, y: p.y };
    }

    return { type: 'none' };
  }

  function applyAction(action, side = state.currentPlayer){
    if (!action || !action.type) return false;

    if (action.type === 'decision') {
      if (!state.pendingDecision || state.pendingDecision.chooser !== side) return false;
      return executeDecision(action.decisionId);
    }

    if (isOnlineMatch() && side !== state.currentPlayer && action.type !== 'newRack') return false;
    if ((state.pendingDecision || state.gameOver) && action.type !== 'newRack') return false;

    if (action.type === 'selectPocket') {
      if (state.breakShot || !allStopped()) return false;
      state.selectedPocket = action.pocketIndex;
      updateHud();
      showToast(`ポケット ${action.pocketIndex + 1} をコール`);
      return true;
    }

    if (action.type === 'selectBall') {
      if (!allStopped() || !canCallBall(action.ballNum)) return false;
      state.selectedBall = action.ballNum;
      if (state.selectedPocket == null) showToast(`球 ${action.ballNum} を選択`);
      updateHud();
      return true;
    }

    if (action.type === 'placeCue') {
      if (!state.ballInHand) return false;
      if (tryPlaceCue(action.x, action.y)) {
        updateHud();
        return true;
      }
      showToast('その位置には白球を置けません');
      return false;
    }

    if (action.type === 'clearCall') {
      state.selectedBall = null;
      state.selectedPocket = null;
      updateHud();
      return true;
    }

    if (action.type === 'resetCue') {
      if (!allStopped()) return false;
      if (!state.ballInHand && !state.breakShot) return false;
      resetCueToCenter();
      if (state.inHandMode === 'head' && state.cueBall.x > HEAD_X - 5) state.cueBall.x = TABLE.x + TABLE.w * 0.23;
      return true;
    }

    if (action.type === 'newRack') {
      startRack(state.currentPlayer);
      return true;
    }

    if (action.type === 'launch') {
      state.dragPos.x = action.x;
      state.dragPos.y = action.y;
      return launch();
    }

    return false;
  }

  function onPointerDown(ev){
    ev.preventDefault();
    const p = worldFromScreen(getPos(ev));
    const action = analyzeBoardPress(p);
    if (action.type === 'none') return;

    if (action.type === 'blocked') {
      if (!state.breakShot) showToast('先に球とポケットをコール');
      return;
    }

    if (action.type === 'aim') {
      if (!isMyTurn()) return;
      state.draggingAim = true;
      state.dragPos.x = p.x;
      state.dragPos.y = p.y;
      return;
    }

    if (!isMyTurn()) return;

    if (isOnlineMatch() && !isHost()) {
      sendCommand(action);
      return;
    }
    applyAction(action, mySide());
  }

  function onPointerMove(ev){
    if (!state.draggingAim) return;
    const p = worldFromScreen(getPos(ev));
    state.dragPos.x = p.x;
    state.dragPos.y = p.y;
  }

  function onPointerUp(ev){
    if (!state.draggingAim) return;
    state.draggingAim = false;
    if (!isMyTurn()) return;
    const p = worldFromScreen(getPos(ev.changedTouches ? { touches: [ev.changedTouches[0]] } : ev));
    state.dragPos.x = p.x;
    state.dragPos.y = p.y;
    if (isOnlineMatch() && !isHost()) {
      sendCommand({ type: 'launch', x: p.x, y: p.y });
      return;
    }
    launch();
  }

  function launch(){
    if (!canShootNow()) return false;
    const cue = state.cueBall;
    const dx = cue.x - state.dragPos.x;
    const dy = cue.y - state.dragPos.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 6) return false;
    const power = Math.min(240, dist);
    const speed = 3.55 * power;
    cue.vx = dx / dist * speed;
    cue.vy = dy / dist * speed;
    cue.glow = 1;
    state.ballInHand = false;
    state.inHandMode = null;
    beginShotContext();
    updateHud();
    return true;
  }

  function renderDecision(){
    const pending = state.pendingDecision;
    if (!pending) {
      decisionBox.classList.remove('show');
      decisionButtons.innerHTML = '';
      return;
    }

    decisionTitle.textContent = pending.title;
    decisionText.textContent = pending.text;
    decisionButtons.innerHTML = '';
    const mine = !isOnlineMatch() || pending.chooser === mySide();

    pending.buttons.forEach(btn => {
      const el = document.createElement('button');
      el.textContent = btn.label;
      if (btn.alt) el.className = 'alt';
      if (!mine) el.disabled = true;
      el.onclick = () => {
        if (!mine) return;
        if (isOnlineMatch() && !isHost()) {
          sendCommand({ type: 'decision', decisionId: btn.id });
          return;
        }
        executeDecision(btn.id);
      };
      decisionButtons.appendChild(el);
    });
    decisionBox.classList.add('show');
  }

  function executeDecision(id){
    const fn = decisionActions.get(id);
    if (!fn) return false;
    decisionActions.delete(id);
    state.pendingDecision = null;
    renderDecision();
    fn();
    return true;
  }

  function resolveDecision(title, text, buttons, chooserIndex = state.currentPlayer){
    decisionActions.clear();
    state.pendingDecision = {
      id: `d${++decisionSeq}`,
      title,
      text,
      chooser: chooserIndex,
      buttons: buttons.map((btn, idx) => {
        const id = `${Date.now()}_${decisionSeq}_${idx}`;
        decisionActions.set(id, btn.action);
        return { id, label: btn.label, alt: !!btn.alt };
      })
    };
    renderDecision();
  }

  function finishRack(winnerIndex, text){
    state.players[winnerIndex].wins += 1;
    state.gameOver = true;
    updateHud();
    setStatus(text + ` 勝者: ${state.players[winnerIndex].name}`);
    showToast(text);
    resolveDecision('ラック終了', text, [
      {
        label: `${state.players[winnerIndex].name} が次をブレイク`,
        action: () => {
          state.rack += 1;
          startRack(winnerIndex);
        }
      },
      {
        label: 'P1 がブレイク',
        alt: true,
        action: () => {
          state.rack += 1;
          startRack(0);
        }
      },
      {
        label: 'P2 がブレイク',
        alt: true,
        action: () => {
          state.rack += 1;
          startRack(1);
        }
      }
    ], winnerIndex);
  }

  function ballPocket(ball, pocketIndex){
    ball.alive = false;
    ball.vx = ball.vy = 0;
    ball.glow = 0;
    spawnParticles(ball.x, ball.y, ball.kind === 'cue' ? '#ffffff' : ball.color, 14);
    if (state.shotActive && state.shotCtx) {
      state.shotCtx.pocketed.push({ num: ball.num, pocketIndex });
      if (state.shotCtx.firstContact != null) state.shotCtx.railAfterContact = true;
      if (ball.kind === 'cue') state.shotCtx.scratch = true;
    }
  }

  function spotEight(){
    let x = TABLE.x + TABLE.w * 0.61;
    let y = TABLE.y + TABLE.h / 2;
    const eight = objectBall(8);
    if (!eight) return;
    while (!validSpot(x, y, eight)) {
      x += BALL_R * 2.05;
      if (x > TABLE.x + TABLE.w * 0.85) break;
    }
    eight.x = x;
    eight.y = y;
    eight.vx = eight.vy = 0;
    eight.alive = true;
  }

  function validSpot(x, y, targetBall){
    const left = TABLE.x + TABLE.rail + BALL_R;
    const right = TABLE.x + TABLE.w - TABLE.rail - BALL_R;
    const top = TABLE.y + TABLE.rail + BALL_R;
    const bottom = TABLE.y + TABLE.h - TABLE.rail - BALL_R;
    if (x < left || x > right || y < top || y > bottom) return false;
    for (const b of state.balls) {
      if (!b.alive || b === targetBall) continue;
      if (Math.hypot(x - b.x, y - b.y) < BALL_R * 2 + 0.5) return false;
    }
    return true;
  }

  function afterBallsStop(){
    if (!state.shotActive || !allStopped()) return;
    const shot = state.shotCtx;
    endShotContext();

    const shooterIndex = state.currentPlayer;
    const shooter = state.players[shooterIndex];
    const oppIndex = 1 - shooterIndex;
    const pocketedObjects = shot.pocketed.filter(p => p.num !== 0);
    const eightPocket = shot.pocketed.find(p => p.num === 8);
    const madeCalled = state.selectedBall != null && state.selectedPocket != null &&
      shot.pocketed.some(p => p.num === state.selectedBall && p.pocketIndex === state.selectedPocket);

    if (state.breakShot) {
      const legalBreak = pocketedObjects.length > 0 || shot.breakRailSet.size >= 4;
      if (!legalBreak) {
        resolveDecision(
          'イリーガルブレイク',
          '4球以上がレールに達せず、球も入っていません。簡略化せず、WPAの選択肢を出します。',
          [
            { label: `${state.players[oppIndex].name} が配置を受けて続行`, action: () => {
                state.breakShot = false;
                switchTurn('相手のイリーガルブレイクを受けて続行。', false, null);
              } 
            },
            { label: `${state.players[oppIndex].name} が再ラックして自分でブレイク`, action: () => {
                startRack(oppIndex);
              } 
            },
            { label: `${state.players[shooterIndex].name} に再ブレイクさせる`, alt: true, action: () => {
                startRack(shooterIndex);
              } 
            }
          ]
        , oppIndex);

        return;
      }

      if (eightPocket && shot.scratch) {
        resolveDecision(
          '8番＋スクラッチ',
          `${state.players[oppIndex].name} は、8番スポット＋ヘッド内フリーボール か、再ブレイク を選べます。`,
          [
            { label: '8番をスポットして相手が白球自由配置(ヘッド内)', action: () => {
                spotEight();
                state.breakShot = false;
                switchTurn('8番＋スクラッチ。ヘッドライン内フリーボール。', true, 'head');
              } 
            },
            { label: `${state.players[oppIndex].name} が再ブレイク`, action: () => {
                startRack(oppIndex);
              } 
            }
          ]
        , oppIndex);
        return;
      }

      if (eightPocket) {
        resolveDecision(
          'ブレイクで8番イン',
          `${state.players[shooterIndex].name} は、8番をスポットして続行 か、再ブレイク を選べます。`,
          [
            { label: '8番をスポットして続行', action: () => {
                spotEight();
                state.breakShot = false;
                state.selectedBall = null;
                state.selectedPocket = null;
                updateHud();
                setStatus(`${state.players[shooterIndex].name} 続行。テーブルはオープン。球とポケットをコール。`);
              } 
            },
            { label: '再ブレイク', action: () => {
                startRack(shooterIndex);
              } 
            }
          ]
        , shooterIndex);
        return;
      }

      if (shot.scratch) {
        resolveDecision(
          'ブレイクファウル',
          `${state.players[oppIndex].name} は、現在配置を受ける か、ヘッドライン内フリーボールを取る か選べます。`,
          [
            { label: '現在配置を受ける', action: () => {
                state.breakShot = false;
                switchTurn('ブレイクファウル後、配置を受けて続行。', false, null);
              } 
            },
            { label: 'ヘッドライン内フリーボール', action: () => {
                state.breakShot = false;
                switchTurn('ブレイクファウル。ヘッドライン内フリーボール。', true, 'head');
              } 
            }
          ]
        , oppIndex);
        return;
      }

      state.breakShot = false;
      if (pocketedObjects.length > 0) {
        state.selectedBall = null;
        state.selectedPocket = null;
        updateHud();
        setStatus(`${state.players[shooterIndex].name} の続行。テーブルはオープン。球とポケットをコール。`);
      } else {
        switchTurn('ブレイクでノーポケット。テーブルはオープン。球とポケットをコール。', false, null);
      }
      return;
    }

    let foul = false;
    let foulReason = '';

    if (shot.scratch) {
      foul = true;
      foulReason = 'スクラッチ';
    }

    if (!foul && shot.startedFromHead && !shot.cueCrossedHead && shot.firstContact != null) {
      const firstBallForHead = objectBall(shot.firstContact);
      if (firstBallForHead && firstBallForHead.x < HEAD_X) {
        foul = true;
        foulReason = 'ヘッドライン内からの不正な初球';
      }
    }

    if (!foul && shot.firstContact == null) {
      foul = true;
      foulReason = '白球が的球に当たっていません';
    } else {
      if (state.openTable) {
        if (shot.firstContact === 8) {
          foul = true;
          foulReason = 'オープンテーブルで8番を先に当てました';
        }
      } else {
        const needEight = countRemaining(shooter.group) === 0;
        if (needEight) {
          if (shot.firstContact !== 8) {
            foul = true;
            foulReason = '8番を先に当てていません';
          }
        } else {
          const firstBall = objectBall(shot.firstContact);
          if (!firstBall || firstBall.group !== shooter.group) {
            foul = true;
            foulReason = '自分の組の球を先に当てていません';
          }
        }
      }
    }

    if (!foul && !shot.railAfterContact) {
      foul = true;
      foulReason = 'コンタクト後にレール到達またはポケットがありません';
    }

    if (eightPocket) {
      const ownCleared = state.openTable ? false : countRemaining(shooter.group) === 0;
      const correctEightCall = state.selectedBall === 8 && state.selectedPocket === eightPocket.pocketIndex;
      if (foul || !ownCleared || !correctEightCall) {
        finishRack(oppIndex, `${shooter.name} は8番を不正にポケット。`);
      } else {
        finishRack(shooterIndex, `${shooter.name} が8番を合法ポケット。`);
      }
      return;
    }

    if (!foul && state.openTable && madeCalled) {
      shooter.group = objectBall(state.selectedBall).group;
      state.players[oppIndex].group = shooter.group === 'solid' ? 'stripe' : 'solid';
      state.openTable = false;
    }

    state.selectedBall = null;
    state.selectedPocket = null;

    if (foul) {
      switchTurn(`${foulReason} 相手にフリーボール。`, true, 'any');
      updateHud();
      return;
    }

    if (madeCalled) {
      updateHud();
      setStatus(`${shooter.name} がコール成功。続行。`);
      return;
    }

    switchTurn('コール不成立。手番交代。', false, null);
    updateHud();
  }

  function step(dt){
    const friction = Math.pow(0.9885, dt * 60);

    for (const ball of state.balls) {
      if (!ball.alive) continue;
      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;
      ball.vx *= friction;
      ball.vy *= friction;
      ball.glow *= 0.95;
      if (Math.abs(ball.vx) < 3.5) ball.vx = 0;
      if (Math.abs(ball.vy) < 3.5) ball.vy = 0;

      if (state.shotActive && state.shotCtx && ball.kind === 'cue' && ball.x > HEAD_X) {
        state.shotCtx.cueCrossedHead = true;
      }

      const left = TABLE.x + TABLE.rail + ball.r;
      const right = TABLE.x + TABLE.w - TABLE.rail - ball.r;
      const top = TABLE.y + TABLE.rail + ball.r;
      const bottom = TABLE.y + TABLE.h - TABLE.rail - ball.r;

      let railHit = false;

      if (ball.x < left) { ball.x = left; ball.vx = Math.abs(ball.vx) * 0.96; railHit = true; }
      if (ball.x > right) { ball.x = right; ball.vx = -Math.abs(ball.vx) * 0.96; railHit = true; }
      if (ball.y < top) { ball.y = top; ball.vy = Math.abs(ball.vy) * 0.96; railHit = true; }
      if (ball.y > bottom) { ball.y = bottom; ball.vy = -Math.abs(ball.vy) * 0.96; railHit = true; }

      if (railHit) {
        if (state.shotActive && state.shotCtx) {
          if (state.breakShot && ball.kind === 'object') state.shotCtx.breakRailSet.add(ball.num);
          if (state.shotCtx.firstContact != null) state.shotCtx.railAfterContact = true;
        }
        spawnParticles(ball.x, ball.y, ball.kind === 'cue' ? '#ffffff' : ball.color, 2);
      }
    }

    for (let i = 0; i < state.balls.length; i++) {
      const a = state.balls[i];
      if (!a.alive) continue;
      for (let j = i + 1; j < state.balls.length; j++) {
        const b = state.balls[j];
        if (!b.alive) continue;

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minDist = a.r + b.r;
        if (dist <= 0 || dist >= minDist) continue;

        const nx = dx / dist;
        const ny = dy / dist;
        const overlap = minDist - dist;
        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;

        const rvx = b.vx - a.vx;
        const rvy = b.vy - a.vy;
        const relVel = rvx * nx + rvy * ny;
        if (relVel > 0) continue;

        if (state.shotActive && state.shotCtx && state.shotCtx.firstContact == null) {
          if (a.kind === 'cue' && b.kind === 'object') state.shotCtx.firstContact = b.num;
          if (b.kind === 'cue' && a.kind === 'object') state.shotCtx.firstContact = a.num;
        }

        const restitution = 0.985;
        const impulse = -(1 + restitution) * relVel / 2;
        const ix = impulse * nx;
        const iy = impulse * ny;
        a.vx -= ix; a.vy -= iy;
        b.vx += ix; b.vy += iy;
        a.glow = b.glow = 1;
      }
    }

    for (const ball of state.balls) {
      if (!ball.alive) continue;
      for (let i = 0; i < pockets.length; i++) {
        if (Math.hypot(ball.x - pockets[i].x, ball.y - pockets[i].y) < TABLE.pocketR - 2) {
          ballPocket(ball, i);
          break;
        }
      }
    }

    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.life -= dt;
      if (p.life <= 0) { state.particles.splice(i, 1); continue; }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.985;
      p.vy *= 0.985;
    }

    if (state.shotActive && allStopped()) {
      if (!state.cueBall.alive) {
        state.cueBall.alive = true;
        state.cueBall.vx = state.cueBall.vy = 0;
        if (!validCuePlacement(state.cueBall.x, state.cueBall.y)) resetCueToCenter();
      }
      afterBallsStop();
    }
  }

  function spawnParticles(x, y, color, count){
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 30 + Math.random() * 120;
      state.particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 0.15 + Math.random() * 0.4,
        color,
        size: 1 + Math.random() * 2.5
      });
    }
  }

  function draw(){
    const cw = canvas.clientWidth;
    const ch = canvas.clientHeight;
    ctx.clearRect(0, 0, cw, ch);

    const scale = Math.min(cw / 1280, ch / 720);
    const ox = (cw - 1280 * scale) * 0.5;
    const oy = (ch - 720 * scale) * 0.5;

    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(scale, scale);

    drawTable();
    drawPockets();
    drawHeadString();
    drawBalls();
    drawAim();
    drawParticles();
    drawCallHighlights();
    drawTexts();

    ctx.restore();
  }

  function drawTable(){
    roundRect(ctx, 36, 28, 1166, 658, 34);
    const wood = ctx.createLinearGradient(0, 28, 0, 686);
    wood.addColorStop(0, '#9a6934');
    wood.addColorStop(1, '#6b421e');
    ctx.fillStyle = wood;
    ctx.fill();

    roundRect(ctx, TABLE.x - 18, TABLE.y - 18, TABLE.w + 36, TABLE.h + 36, 28);
    ctx.fillStyle = '#4d2d15';
    ctx.fill();

    roundRect(ctx, TABLE.x, TABLE.y, TABLE.w, TABLE.h, 22);
    const felt = ctx.createLinearGradient(TABLE.x, TABLE.y, TABLE.x, TABLE.y + TABLE.h);
    felt.addColorStop(0, '#237849');
    felt.addColorStop(1, '#164f30');
    ctx.fillStyle = felt;
    ctx.fill();

    roundRect(ctx, TABLE.x + TABLE.rail - 8, TABLE.y + TABLE.rail - 8, TABLE.w - (TABLE.rail - 8) * 2, TABLE.h - (TABLE.rail - 8) * 2, 16);
    const inner = ctx.createLinearGradient(0, TABLE.y, 0, TABLE.y + TABLE.h);
    inner.addColorStop(0, '#1b6a41');
    inner.addColorStop(1, '#155434');
    ctx.fillStyle = inner;
    ctx.fill();
  }

  function drawPockets(){
    for (let i = 0; i < pockets.length; i++) {
      const p = pockets[i];
      const g = ctx.createRadialGradient(p.x, p.y, 4, p.x, p.y, TABLE.pocketR + 8);
      g.addColorStop(0, '#081017');
      g.addColorStop(1, '#000000');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, TABLE.pocketR + 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 3;
      ctx.strokeStyle = state.selectedPocket === i ? '#ffd978' : 'rgba(255,255,255,.18)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, TABLE.pocketR + 11, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawHeadString(){
    ctx.strokeStyle = 'rgba(255,255,255,.18)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 10]);
    ctx.beginPath();
    ctx.moveTo(HEAD_X, TABLE.y + TABLE.rail);
    ctx.lineTo(HEAD_X, TABLE.y + TABLE.h - TABLE.rail);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawBalls(){
    for (const b of state.balls) {
      if (!b.alive) continue;
      const glow = ctx.createRadialGradient(b.x - 4, b.y - 4, 2, b.x, b.y, b.r * 1.6);
      if (b.kind === 'cue') {
        glow.addColorStop(0, '#ffffff');
        glow.addColorStop(1, '#bccad5');
      } else if (b.group === 'eight') {
        glow.addColorStop(0, '#4b4b4b');
        glow.addColorStop(1, '#111111');
      } else {
        glow.addColorStop(0, lighten(b.color, 26));
        glow.addColorStop(1, shade(b.color, -18));
      }
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();

      if (b.kind === 'object' && b.group === 'stripe') {
        ctx.save();
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.clip();
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2);
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x - b.r, b.y - b.r * 0.55, b.r * 2, b.r * 1.1);
        ctx.restore();
        ctx.strokeStyle = 'rgba(0,0,0,.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (b.kind === 'cue') {
        ctx.fillStyle = 'rgba(255,255,255,.95)';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 0.28, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 0.47, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0b1521';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(b.num), b.x, b.y + 0.3);
      }

      ctx.globalAlpha = 0.28 + b.glow * 0.22;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.26, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      if (state.selectedBall === b.num) {
        ctx.strokeStyle = '#ffd978';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r + 5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  function drawAim(){
    if (!state.draggingAim || !state.cueBall.alive) return;
    const cue = state.cueBall;
    const dx = cue.x - state.dragPos.x;
    const dy = cue.y - state.dragPos.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 4) return;
    const len = Math.min(240, dist);
    const nx = dx / dist;
    const ny = dy / dist;
    const endX = cue.x + nx * (80 + len * 0.85);
    const endY = cue.y + ny * (80 + len * 0.85);

    ctx.strokeStyle = 'rgba(255,255,255,.78)';
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 10]);
    ctx.beginPath();
    ctx.moveTo(cue.x, cue.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);

    const ratio = len / 240;
    roundRect(ctx, TABLE.x + TABLE.w - 30, TABLE.y + 45, 12, 150, 8);
    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.fill();
    ctx.fillStyle = ratio > .75 ? '#ff8d76' : '#7ed9ff';
    roundRect(ctx, TABLE.x + TABLE.w - 30, TABLE.y + 45 + (1 - ratio) * 150, 12, 150 * ratio, 8);
    ctx.fill();
  }

  function drawParticles(){
    for (const p of state.particles) {
      ctx.globalAlpha = Math.max(0, p.life / 0.5);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCallHighlights(){
    if (state.breakShot) return;
    ctx.fillStyle = 'rgba(255,255,255,.8)';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Click ball → pocket, then drag cue ball', TABLE.x + 12, TABLE.y - 18);
  }

  function drawTexts(){
    ctx.fillStyle = 'rgba(255,255,255,.82)';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${player().name} turn`, TABLE.x + 8, TABLE.y + TABLE.h + 36);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.68)';
    const group = player().group ? ` / ${groupName(player().group)}` : '';
    ctx.fillText(`Current: ${player().name}${group}`, TABLE.x + 8, TABLE.y + TABLE.h + 58);
    if (state.ballInHand) {
      ctx.fillStyle = '#ffe38d';
      ctx.fillText(state.inHandMode === 'head' ? 'Cue ball in hand (head string)' : 'Cue ball in hand', TABLE.x + 260, TABLE.y + TABLE.h + 58);
    }
  }

  function roundRect(ctx, x, y, w, h, r = 12){
    const rr = Math.min(r, w * 0.5, h * 0.5);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function shade(hex, amount){
    const c = hex.replace('#', '');
    const n = parseInt(c.length === 3 ? c.split('').map(v => v + v).join('') : c, 16);
    const clamp = v => Math.max(0, Math.min(255, v));
    const r = clamp((n >> 16) + amount);
    const g = clamp(((n >> 8) & 255) + amount);
    const b = clamp((n & 255) + amount);
    return `rgb(${r},${g},${b})`;
  }

  function lighten(hex, amt){ return shade(hex, amt); }

  function normalizeRoomId(raw){
    return String(raw || '')
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9-]/g, '')
      .slice(0, 32);
  }

  function randomRoomId(){
    const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
    let out = 'room-';
    for (let i = 0; i < 6; i++) out += chars[(Math.random() * chars.length) | 0];
    return out;
  }

  function buildInviteUrl(roomId){
    const url = new URL(window.location.href);
    url.searchParams.set('room', roomId);
    return url.toString();
  }

  function refreshNetUi(){
    roomChip.textContent = `部屋ID: ${net.roomId || '-'}`;
    inviteUrl.value = net.inviteUrl || '';
    if (net.roomId) roomInput.value = net.roomId;
    if (isOnlineMatch()) {
      modeChip.textContent = net.side === 0 ? 'P1 接続中' : 'P2 接続中';
    } else if (net.mode === 'host') {
      modeChip.textContent = 'P1 待機中';
    } else if (net.mode === 'join') {
      modeChip.textContent = 'P2 参加中';
    } else {
      modeChip.textContent = '未接続';
    }
    joinHint.textContent = location.protocol === 'file:'
      ? 'ローカルファイルでは部屋IDで参加。'
      : 'URLを送ればそのまま参加。';
  }

  function isConnOpen(){
    return !!(net.conn && net.conn.open);
  }

  function closeConnection(){
    if (net.conn) {
      try { net.conn.close(); } catch (_) {}
    }
    if (net.peer) {
      try { net.peer.destroy(); } catch (_) {}
    }
    net.mode = 'offline';
    net.side = 0;
    net.peer = null;
    net.conn = null;
    net.connected = false;
    net.roomId = '';
    net.inviteUrl = '';
    setNetStatus('オフライン');
    refreshNetUi();
  }

  function setNetStatus(text){
    netStatus.textContent = text;
  }

  function applyMessage(msg){
    if (!msg || !msg.type) return;
    if (msg.type === 'state' && !isHost()) {
      applySnapshot(msg.payload);
    } else if (msg.type === 'cmd' && isHost()) {
      handleRemoteCommand(msg.cmd);
    }
  }

  function setConnection(conn){
    net.conn = conn;
    conn.on('open', () => {
      net.connected = true;
      setNetStatus(net.side === 0 ? '接続中 / あなた=P1' : '接続中 / あなた=P2');
      refreshNetUi();
      if (isHost()) sendState(true);
      renderDecision();
    });
    conn.on('close', () => {
      if (net.conn !== conn) return;
      net.connected = false;
      setNetStatus('切断');
      refreshNetUi();
      renderDecision();
    });
    conn.on('error', () => {
      if (net.conn !== conn) return;
      net.connected = false;
      setNetStatus('通信エラー');
      refreshNetUi();
    });
    conn.on('data', (msg) => {
      if (typeof msg === 'string') {
        try { msg = JSON.parse(msg); } catch (_) {}
      }
      applyMessage(msg);
    });
  }

  function bindPeer(peer){
    peer.on('error', (err) => {
      const type = err && err.type ? err.type : '';
      if (type === 'peer-unavailable') {
        setNetStatus('部屋が見つからない');
      } else if (type === 'unavailable-id') {
        setNetStatus('部屋IDが重複');
      } else {
        setNetStatus('接続エラー');
      }
    });
    peer.on('disconnected', () => {
      net.connected = false;
      refreshNetUi();
      setNetStatus('切断');
    });
    peer.on('close', () => {
      net.connected = false;
      refreshNetUi();
      setNetStatus('切断');
    });
  }

  function openPeer(peerId){
    return new Promise((resolve, reject) => {
      if (typeof Peer === 'undefined') {
        reject(new Error('PeerJS unavailable'));
        return;
      }
      const peer = peerId ? new Peer(peerId) : new Peer();
      let settled = false;
      const fail = (err) => {
        if (settled) return;
        settled = true;
        try { peer.destroy(); } catch (_) {}
        reject(err);
      };
      peer.on('open', (id) => {
        if (settled) return;
        settled = true;
        bindPeer(peer);
        resolve({ peer, id });
      });
      peer.on('error', fail);
    });
  }

  async function createHost(){
    closeConnection();
    setNetStatus('部屋作成中');
    const roomId = randomRoomId();
    const opened = await openPeer(roomId);
    net.mode = 'host';
    net.side = 0;
    net.peer = opened.peer;
    net.roomId = opened.id;
    net.inviteUrl = buildInviteUrl(opened.id);
    refreshNetUi();
    setNetStatus(location.protocol === 'file:' ? '待機中 / 部屋IDを共有' : '待機中 / URLを共有');
    net.peer.on('connection', (conn) => {
      if (net.conn && net.conn !== conn && isConnOpen()) {
        try { conn.close(); } catch (_) {}
        return;
      }
      net.side = 0;
      setConnection(conn);
    });
  }

  async function joinMatch(roomId = roomInput.value){
    const normalized = normalizeRoomId(roomId || new URL(window.location.href).searchParams.get('room'));
    if (!normalized) {
      setNetStatus('部屋IDがない');
      roomInput.focus();
      return;
    }
    closeConnection();
    setNetStatus('参加中');
    const opened = await openPeer();
    net.mode = 'join';
    net.side = 1;
    net.peer = opened.peer;
    net.roomId = normalized;
    net.inviteUrl = buildInviteUrl(normalized);
    refreshNetUi();
    const conn = net.peer.connect(normalized, { reliable: true, serialization: 'json' });
    setConnection(conn);
  }

  async function copyText(text, success){
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      showToast(success);
    } catch (_) {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      el.remove();
      showToast(success);
    }
  }

  function serializeState(){
    return {
      balls: state.balls.map(b => ({
        num: b.num, kind: b.kind, group: b.group, x: b.x, y: b.y, r: b.r,
        vx: b.vx, vy: b.vy, alive: b.alive, color: b.color, glow: b.glow
      })),
      currentPlayer: state.currentPlayer,
      players: state.players.map(p => ({ name: p.name, group: p.group, wins: p.wins })),
      rack: state.rack,
      breakShot: state.breakShot,
      openTable: state.openTable,
      ballInHand: state.ballInHand,
      inHandMode: state.inHandMode,
      draggingAim: false,
      dragPos: state.dragPos,
      selectedBall: state.selectedBall,
      selectedPocket: state.selectedPocket,
      shotActive: state.shotActive,
      particles: state.particles.slice(-80).map(p => ({ x:p.x, y:p.y, vx:p.vx, vy:p.vy, life:p.life, color:p.color, size:p.size })),
      pendingDecision: state.pendingDecision ? JSON.parse(JSON.stringify(state.pendingDecision)) : null,
      gameOver: state.gameOver,
      statusMessage: state.statusMessage
    };
  }

  function applySnapshot(snapshot){
    if (!snapshot) return;
    state.balls = snapshot.balls.map(b => ({ ...b }));
    state.cueBall = state.balls.find(b => b.num === 0) || null;
    state.currentPlayer = snapshot.currentPlayer;
    state.players = snapshot.players.map(p => ({ ...p }));
    state.rack = snapshot.rack;
    state.breakShot = snapshot.breakShot;
    state.openTable = snapshot.openTable;
    state.ballInHand = snapshot.ballInHand;
    state.inHandMode = snapshot.inHandMode;
    state.draggingAim = false;
    state.dragPos = { ...snapshot.dragPos };
    state.selectedBall = snapshot.selectedBall;
    state.selectedPocket = snapshot.selectedPocket;
    state.shotActive = snapshot.shotActive;
    state.particles = (snapshot.particles || []).map(p => ({ ...p }));
    state.pendingDecision = snapshot.pendingDecision ? JSON.parse(JSON.stringify(snapshot.pendingDecision)) : null;
    state.gameOver = snapshot.gameOver;
    setStatus(snapshot.statusMessage || '');
    updateHud();
    renderDecision();
  }

  function sendState(force = false, now = performance.now()){
    if (!isHost() || !isOnlineMatch()) return;
    if (!force && now - net.lastSyncAt < 50) return;
    net.lastSyncAt = now;
    net.conn.send({ type: 'state', payload: serializeState() });
  }

  function sendCommand(cmd){
    if (!isOnlineMatch() || isHost()) return;
    net.conn.send({ type: 'cmd', cmd });
  }

  function handleRemoteCommand(cmd){
    if (!cmd) return;
    const changed = applyAction(cmd, 1);
    if (changed) sendState(true);
  }

  function loop(now){
    const dt = Math.min(0.033, ((now || 0) - (state.lastTick || now)) / 1000 || 0.016);
    state.lastTick = now || 0;
    if (!isOnlineMatch() || isHost()) {
      step(dt);
    }
    draw();
    if (isHost() && isOnlineMatch()) sendState(false, now || performance.now());
    requestAnimationFrame(loop);
  }

  newRackBtn.addEventListener('click', () => {
    if (isOnlineMatch() && !isHost()) { sendCommand({ type: 'newRack' }); return; }
    applyAction({ type: 'newRack' }, mySide());
  });
  passCueBtn.addEventListener('click', () => {
    if (!isMyTurn()) return;
    if (isOnlineMatch() && !isHost()) { sendCommand({ type: 'resetCue' }); return; }
    applyAction({ type: 'resetCue' }, mySide());
  });
  clearCallBtn.addEventListener('click', () => {
    if (!isMyTurn()) return;
    if (isOnlineMatch() && !isHost()) { sendCommand({ type: 'clearCall' }); return; }
    applyAction({ type: 'clearCall' }, mySide());
  });
  hostBtn.addEventListener('click', () => { createHost().catch(() => setNetStatus('部屋作成失敗')); });
  joinBtn.addEventListener('click', () => { joinMatch().catch(() => setNetStatus('参加失敗')); });
  copyInviteBtn.addEventListener('click', () => { copyText(inviteUrl.value.trim(), 'URLをコピー'); });
  copyRoomBtn.addEventListener('click', () => { copyText(net.roomId || roomInput.value.trim(), 'IDをコピー'); });
  roomInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') joinMatch().catch(() => setNetStatus('参加失敗'));
  });
  disconnectBtn.addEventListener('click', closeConnection);

  window.addEventListener('resize', resize);
  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  window.addEventListener('touchend', onPointerUp, { passive: false });

  refreshNetUi();
  const initialRoom = normalizeRoomId(new URL(window.location.href).searchParams.get('room'));
  if (initialRoom) {
    roomInput.value = initialRoom;
    setNetStatus('招待URLを検出');
    joinMatch(initialRoom).catch(() => setNetStatus('参加失敗'));
  }
  resize();
  startRack(0);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
