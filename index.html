<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>9ボール 通信版</title>
<style>
  :root{
    --bg:#08131f;
    --panel:rgba(10,20,32,.88);
    --panel-2:rgba(255,255,255,.045);
    --line:rgba(255,255,255,.12);
    --line-strong:rgba(255,255,255,.18);
    --text:#eef7ff;
    --muted:#b8c7d8;
    --accent:#8fd8ff;
    --accent-2:#c5f0ff;
    --good:#88f2b5;
    --bad:#ff9f9f;
    --warn:#ffd77a;
    --table:#1d6a3f;
    --table2:#175331;
    --rail:#6e4a24;
    --wood:#8a5a2b;
    --shadow:0 18px 50px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;width:100%;height:100%;overflow:hidden;
    font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;
    background:radial-gradient(circle at top,#20466d 0%, #10243b 35%, #08121f 100%);
    color:var(--text);
  }
  .app{
    width:100%;height:100%;
    display:grid;
    grid-template-columns:minmax(270px,320px) 1fr;
    gap:12px;
    padding:12px;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:24px;
    backdrop-filter:blur(10px);
    box-shadow:var(--shadow);
    min-height:0;
  }
  .side{
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    min-height:0;
  }
  h1{margin:0;font-size:28px;letter-spacing:.02em}
  .mini{font-size:12px;color:var(--muted);line-height:1.5}
  .section{
    padding:12px;
    border-radius:18px;
    background:var(--panel-2);
    border:1px solid rgba(255,255,255,.08);
  }
  .sectionTitle{
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:8px;
    font-weight:700;
  }
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .stack{display:flex;flex-direction:column;gap:8px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat{
    padding:11px 12px;
    border-radius:16px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
  }
  .label{font-size:12px;color:var(--muted)}
  .value{font-size:24px;font-weight:800;margin-top:3px;line-height:1.1}
  .value.small{font-size:17px}
  .note{
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    line-height:1.5;
    color:var(--text);
  }
  button,input{
    font:inherit;
    border:none;
    outline:none;
  }
  button{
    padding:10px 12px;
    min-height:42px;
    border-radius:13px;
    background:var(--accent);
    color:#04121d;
    font-weight:800;
    cursor:pointer;
    transition:transform .08s ease, opacity .15s ease, background .15s ease;
  }
  button:hover{transform:translateY(-1px)}
  button:active{transform:translateY(0)}
  button.alt{
    background:rgba(255,255,255,.08);
    color:var(--text);
    border:1px solid rgba(255,255,255,.12);
  }
  button.ghost{
    background:rgba(255,255,255,.04);
    color:var(--muted);
    border:1px solid rgba(255,255,255,.08);
  }
  button:disabled{opacity:.5;cursor:not-allowed;transform:none}
  input{
    width:100%;
    min-height:42px;
    padding:10px 12px;
    border-radius:13px;
    background:rgba(255,255,255,.06);
    color:var(--text);
    border:1px solid rgba(255,255,255,.12);
  }
  .status{
    padding:10px 12px;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    line-height:1.45;
  }
  .status.good{border-color:rgba(136,242,181,.35)}
  .status.bad{border-color:rgba(255,159,159,.35)}
  .status.warn{border-color:rgba(255,215,122,.35)}
  .ballstrip{
    display:grid;
    grid-template-columns:repeat(5, minmax(0, 1fr));
    gap:8px;
  }
  .ballchip{
    aspect-ratio:1;
    border-radius:999px;
    border:2px solid rgba(255,255,255,.12);
    display:grid;
    place-items:center;
    font-size:14px;
    font-weight:800;
    color:#10243b;
    background:#fff;
    position:relative;
    box-shadow:inset 0 -2px 0 rgba(0,0,0,.12);
  }
  .ballchip.off{
    opacity:.22;
    filter:grayscale(.25);
  }
  .ballchip.target{
    outline:3px solid rgba(255,255,255,.8);
    outline-offset:1px;
    transform:scale(1.04);
  }
  .ballchip::after{
    content:"";
    position:absolute;
    inset:22%;
    border-radius:999px;
    background:rgba(255,255,255,.9);
    z-index:0;
  }
  .ballchip span{position:relative;z-index:1}
  .ballchip.n8 span{color:#fff}
  .ballchip.n8::after{background:rgba(255,255,255,.12)}
  .game{
    position:relative;
    overflow:hidden;
    min-height:0;
    background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
  }
  canvas{width:100%;height:100%;display:block;touch-action:none}
  .hud{
    position:absolute;
    left:14px;
    right:14px;
    top:14px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    pointer-events:none;
  }
  .hudLeft,.hudRight{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:flex-start;
  }
  .pill{
    padding:9px 12px;
    border-radius:999px;
    background:rgba(6,14,24,.8);
    border:1px solid rgba(255,255,255,.14);
    color:var(--text);
    font-weight:800;
    font-size:13px;
    backdrop-filter:blur(6px);
  }
  .pill.good{border-color:rgba(136,242,181,.4)}
  .pill.bad{border-color:rgba(255,159,159,.45)}
  .pill.warn{border-color:rgba(255,215,122,.4)}
  .banner{
    position:absolute;
    left:50%;
    top:68px;
    transform:translateX(-50%) translateY(-10px);
    min-width:min(560px, calc(100% - 32px));
    max-width:calc(100% - 32px);
    text-align:center;
    padding:12px 16px;
    border-radius:18px;
    background:rgba(6,14,24,.9);
    border:1px solid rgba(255,255,255,.14);
    font-weight:800;
    letter-spacing:.02em;
    opacity:0;
    pointer-events:none;
    transition:.18s ease;
    box-shadow:0 12px 36px rgba(0,0,0,.25);
  }
  .banner.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .banner.good{border-color:rgba(136,242,181,.45)}
  .banner.bad{border-color:rgba(255,159,159,.45)}
  .banner.warn{border-color:rgba(255,215,122,.45)}
  .toast{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    background:rgba(6,14,24,.92);
    border:1px solid rgba(255,255,255,.12);
    padding:10px 14px;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
    transition:.18s ease;
    color:var(--text);
    font-weight:700;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .meterWrap{
    position:absolute;
    right:16px;
    bottom:16px;
    width:14px;
    height:140px;
    border-radius:999px;
    background:rgba(6,14,24,.78);
    border:1px solid rgba(255,255,255,.12);
    overflow:hidden;
    pointer-events:none;
    opacity:.95;
  }
  .meterFill{
    position:absolute;
    left:0;right:0;bottom:0;
    background:linear-gradient(180deg, #baf0ff 0%, #8fd8ff 45%, #ffd77a 100%);
    border-radius:999px;
    height:0%;
  }
  .meterLabel{
    position:absolute;
    right:38px;
    bottom:16px;
    padding:6px 10px;
    border-radius:999px;
    background:rgba(6,14,24,.78);
    border:1px solid rgba(255,255,255,.12);
    font-size:12px;
    font-weight:700;
    pointer-events:none;
  }
  .footerMini{
    font-size:11px;
    color:var(--muted);
    line-height:1.5;
  }
  @media (max-width: 980px){
    .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .side{max-height:44vh;overflow:auto}
    .stats{grid-template-columns:repeat(4,1fr)}
  }
  @media (max-width: 620px){
    .app{padding:8px;gap:8px}
    .panel{border-radius:18px}
    .side{padding:10px}
    .stats{grid-template-columns:1fr 1fr}
    .hud{left:8px;right:8px;top:8px}
    .banner{top:58px}
    .meterWrap{height:110px;right:10px;bottom:10px}
    .meterLabel{right:32px;bottom:10px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="panel side">
    <div>
      <h1>9ボール</h1>
      <div class="mini">URL招待で対戦 / 先球に当てて9番を落とせば勝ち</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">あなた</div><div class="value small" id="roleLabel">P1</div></div>
      <div class="stat"><div class="label">手番</div><div class="value" id="turnLabel">P1</div></div>
      <div class="stat"><div class="label">先球</div><div class="value" id="remainLabel">1</div></div>
      <div class="stat"><div class="label">状態</div><div class="value small" id="phaseLabel">待機</div></div>
    </div>

    <div class="section stack">
      <div class="sectionTitle">接続</div>
      <div class="row">
        <button id="hostBtn">部屋作成</button>
        <button id="joinBtn" class="alt">参加</button>
      </div>
      <input id="inviteInput" readonly placeholder="招待URL" />
      <input id="roomInput" placeholder="部屋ID" />
      <div class="row">
        <button id="copyUrlBtn" class="alt">URLコピー</button>
        <button id="copyRoomBtn" class="ghost">IDコピー</button>
        <button id="disconnectBtn" class="ghost">切断</button>
      </div>
      <div class="status" id="netStatus">オフライン</div>
    </div>

    <div class="section stack">
      <div class="sectionTitle">ゲーム</div>
      <div class="row">
        <button id="newGameBtn">新ゲーム</button>
      </div>
      <div class="status" id="gameStatus">白球を引っ張って離す</div>
      <div class="note">先球ガイド付き。ファウル時は相手が<strong>手球あり</strong>になります。</div>
    </div>

    <div class="section stack">
      <div class="sectionTitle">残り球</div>
      <div class="ballstrip" id="ballStrip"></div>
      <div class="footerMini">黄色い枠がいま狙う球です。</div>
    </div>
  </aside>

  <main class="panel game">
    <canvas id="gameCanvas"></canvas>
    <div class="hud">
      <div class="hudLeft">
        <div class="pill" id="hudTurn">あなたの番</div>
        <div class="pill warn" id="hudTarget">先球 1</div>
      </div>
      <div class="hudRight">
        <div class="pill" id="hudRule">9ボール</div>
      </div>
    </div>
    <div class="banner" id="banner"></div>
    <div class="toast" id="toast"></div>
    <div class="meterWrap"><div class="meterFill" id="powerFill"></div></div>
    <div class="meterLabel" id="powerLabel">POWER</div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>
<script>
(() => {
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const toastEl = document.getElementById('toast');
  const bannerEl = document.getElementById('banner');
  const turnLabel = document.getElementById('turnLabel');
  const remainLabel = document.getElementById('remainLabel');
  const roleLabel = document.getElementById('roleLabel');
  const phaseLabel = document.getElementById('phaseLabel');
  const hudTurn = document.getElementById('hudTurn');
  const hudTarget = document.getElementById('hudTarget');
  const hudRule = document.getElementById('hudRule');
  const ballStrip = document.getElementById('ballStrip');
  const powerFill = document.getElementById('powerFill');
  const powerLabel = document.getElementById('powerLabel');
  const gameStatus = document.getElementById('gameStatus');
  const netStatus = document.getElementById('netStatus');
  const inviteInput = document.getElementById('inviteInput');
  const roomInput = document.getElementById('roomInput');

  const hostBtn = document.getElementById('hostBtn');
  const joinBtn = document.getElementById('joinBtn');
  const copyUrlBtn = document.getElementById('copyUrlBtn');
  const copyRoomBtn = document.getElementById('copyRoomBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const newGameBtn = document.getElementById('newGameBtn');

  const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const WORLD_W = 1280;
  const WORLD_H = 760;
  const TABLE = { x: 80, y: 70, w: 1100, h: 620 };
  const HEAD_X = TABLE.x + TABLE.w * 0.25;
  const FOOT_X = TABLE.x + TABLE.w * 0.75;
  const BALL_R = 13;
  const FRICTION = 0.992;
  const STOP_EPS = 0.045;
  const WALL_RESTITUTION = 0.985;
  const BALL_RESTITUTION = 0.992;
  const POWER = 0.13;
  const MAX_PULL = 180;
  const SYNC_MS = 33;

  const view = { rect: null, sx: 1, sy: 1 };

  const pockets = [
    {x:TABLE.x, y:TABLE.y, r:27},
    {x:TABLE.x+TABLE.w/2, y:TABLE.y-5, r:24},
    {x:TABLE.x+TABLE.w, y:TABLE.y, r:27},
    {x:TABLE.x, y:TABLE.y+TABLE.h, r:27},
    {x:TABLE.x+TABLE.w/2, y:TABLE.y+TABLE.h+5, r:24},
    {x:TABLE.x+TABLE.w, y:TABLE.y+TABLE.h, r:27},
  ];

  const numberColors = {
    1:'#f7d548', 2:'#4187ff', 3:'#ef5a4c', 4:'#8848db', 5:'#ff8d31',
    6:'#23a55b', 7:'#7b2e22', 8:'#111111', 9:'#f7d548', 10:'#4187ff'
  };

  const state = {
    balls: [],
    cue: null,
    currentPlayer: 0,
    shotActive: false,
    gameOver: false,
    winner: null,
    breakShot: true,
    cueInHandMode: 'head'
  };

  const shot = {
    startedBy: 0,
    wasBreak: false,
    lowestBefore: 1,
    firstContact: null,
    railAfterContact: false,
    objectRails: new Set(),
    pocketed: [],
    cueScratch: false,
    foulReason: ''
  };

  const local = {
    dragging: false,
    dragPos: { x: 0, y: 0 },
    pointerId: null,
    waitingRemoteAck: false
  };

  const ui = {
    lastTurnKey: '',
    ballStripReady: false
  };

  const net = {
    mode: 'offline',
    side: 0,
    peer: null,
    conn: null,
    connected: false,
    roomId: '',
    inviteUrl: '',
    dirty: false,
    sendSeq: 0,
    lastRecvSeq: -1
  };

  function showToast(text){
    toastEl.textContent = text;
    toastEl.classList.add('show');
    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => toastEl.classList.remove('show'), 1400);
  }

  function showBanner(text, mode=''){
    bannerEl.textContent = text;
    bannerEl.className = 'banner show' + (mode ? ' ' + mode : '');
    clearTimeout(showBanner.timer);
    showBanner.timer = setTimeout(() => {
      bannerEl.className = 'banner';
    }, 1800);
  }

  function setNetStatus(text, mode=''){
    netStatus.textContent = text;
    netStatus.className = 'status' + (mode ? ' ' + mode : '');
  }

  function resize(){
    const rect = canvas.getBoundingClientRect();
    view.rect = rect;
    view.sx = rect.width / WORLD_W;
    view.sy = rect.height / WORLD_H;
    canvas.width = Math.max(1, Math.round(rect.width * DPR));
    canvas.height = Math.max(1, Math.round(rect.height * DPR));
  }

  function setWorldTransform(){
    ctx.setTransform(view.sx * DPR, 0, 0, view.sy * DPR, 0, 0);
  }

  function worldPoint(clientX, clientY){
    const rect = view.rect || canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (WORLD_W / rect.width),
      y: (clientY - rect.top) * (WORLD_H / rect.height)
    };
  }

  function randId(){
    return 'room-' + Math.random().toString(36).slice(2, 8);
  }

  function buildInviteUrl(id){
    const url = new URL(location.href);
    url.searchParams.set('room', id);
    return url.toString();
  }

  function isOnline(){
    return !!(net.connected && net.conn && net.conn.open);
  }

  function isHost(){
    return net.mode === 'host';
  }

  function isAuthority(){
    return !isOnline() || isHost();
  }

  function isMyTurn(){
    if (!isOnline()) return true;
    return state.currentPlayer === net.side;
  }

  function canShootLocal(){
    return !state.gameOver && !state.shotActive && !!state.cue && state.cue.alive && isMyTurn() && !local.waitingRemoteAck;
  }

  function canAcceptRemoteShot(){
    return isHost() && isOnline() && !state.gameOver && !state.shotActive && !!state.cue && state.cue.alive && state.currentPlayer === 1;
  }

  function playerName(idx){
    if (!isOnline()) return 'P' + (idx + 1);
    return idx === net.side ? 'あなた' : '相手';
  }

  function roleText(){
    if (!isOnline()) return 'P1';
    return net.side === 0 ? 'P1 / ホスト' : 'P2 / 参加';
  }

  function phaseText(){
    if (state.gameOver) return '終了';
    if (state.shotActive) return '移動中';
    if (local.waitingRemoteAck) return '送信中';
    if (state.cueInHandMode === 'head') return 'ブレイク';
    if (state.cueInHandMode === 'any') return '手球あり';
    if (isOnline() && !isMyTurn()) return '待機';
    return '狙い';
  }

  function ensureBallStrip(){
    if (ui.ballStripReady) return;
    ballStrip.innerHTML = '';
    for (let n = 1; n <= 9; n++){
      const el = document.createElement('div');
      el.className = 'ballchip n' + n;
      el.dataset.num = String(n);
      el.style.background = numberColors[n] || '#dddddd';
      el.innerHTML = '<span>' + n + '</span>';
      ballStrip.appendChild(el);
    }
    ui.ballStripReady = true;
  }

  function renderBallStrip(){
    ensureBallStrip();
    const target = lowestAliveNumber();
    for (const el of ballStrip.children){
      const num = Number(el.dataset.num);
      const ball = state.balls.find(b => b.num === num);
      const alive = !!(ball && ball.alive);
      el.classList.toggle('off', !alive);
      el.classList.toggle('target', alive && num === target && !state.gameOver);
    }
  }

  function aliveColoredCount(){
    return state.balls.filter(b => b.alive && b.num !== 0).length;
  }

  function lowestAliveNumber(){
    let min = Infinity;
    for (const b of state.balls){
      if (b.alive && b.num !== 0 && b.num < min) min = b.num;
    }
    return Number.isFinite(min) ? min : 0;
  }

  function makeBall(num, x, y){
    return {
      num, x, y, vx: 0, vy: 0, r: BALL_R, alive: true,
      color: num === 0 ? '#ffffff' : (numberColors[num] || '#dddddd')
    };
  }

  function tableBoundsForCue(mode = state.cueInHandMode){
    const maxX = mode === 'head' ? HEAD_X - BALL_R : TABLE.x + TABLE.w - BALL_R;
    return {
      minX: TABLE.x + BALL_R,
      maxX,
      minY: TABLE.y + BALL_R,
      maxY: TABLE.y + TABLE.h - BALL_R
    };
  }

  function isCuePlacementLegal(x, y, mode = state.cueInHandMode){
    const b = tableBoundsForCue(mode);
    if (x < b.minX || x > b.maxX || y < b.minY || y > b.maxY) return false;
    for (const ball of state.balls){
      if (!ball.alive || ball.num === 0) continue;
      if (Math.hypot(ball.x - x, ball.y - y) < BALL_R * 2 + 1.5) return false;
    }
    return true;
  }

  function prepareCueInHand(mode){
    state.cueInHandMode = mode;
    if (!state.cue) return;
    state.cue.alive = true;
    state.cue.vx = 0;
    state.cue.vy = 0;
    const options = mode === 'head'
      ? [
          [TABLE.x + TABLE.w * 0.18, TABLE.y + TABLE.h / 2],
          [TABLE.x + TABLE.w * 0.16, TABLE.y + TABLE.h * 0.38],
          [TABLE.x + TABLE.w * 0.16, TABLE.y + TABLE.h * 0.62]
        ]
      : [
          [TABLE.x + TABLE.w * 0.25, TABLE.y + TABLE.h / 2],
          [TABLE.x + TABLE.w * 0.2, TABLE.y + TABLE.h * 0.4],
          [TABLE.x + TABLE.w * 0.2, TABLE.y + TABLE.h * 0.6]
        ];
    for (const [x, y] of options){
      if (isCuePlacementLegal(x, y, mode)){
        state.cue.x = x;
        state.cue.y = y;
        return;
      }
    }
    const bounds = tableBoundsForCue(mode);
    state.cue.x = bounds.minX + 10;
    state.cue.y = (bounds.minY + bounds.maxY) / 2;
  }

  function tryPlaceCue(point, mode = state.cueInHandMode){
    if (!state.cue || !mode) return false;
    const b = tableBoundsForCue(mode);
    const x = Math.max(b.minX, Math.min(b.maxX, point.x));
    const y = Math.max(b.minY, Math.min(b.maxY, point.y));
    if (!isCuePlacementLegal(x, y, mode)) return false;
    state.cue.alive = true;
    state.cue.vx = 0;
    state.cue.vy = 0;
    state.cue.x = x;
    state.cue.y = y;
    return true;
  }

  function spotNineBall(){
    const nine = state.balls.find(b => b.num === 9);
    if (!nine) return;
    nine.alive = true;
    nine.vx = 0;
    nine.vy = 0;
    const candidates = [];
    for (let i = 0; i < 30; i++){
      candidates.push({ x: FOOT_X - i * (BALL_R * 2 + 1), y: TABLE.y + TABLE.h / 2 });
    }
    candidates.push({ x: FOOT_X - BALL_R * 2, y: TABLE.y + TABLE.h / 2 - BALL_R * 2.2 });
    candidates.push({ x: FOOT_X - BALL_R * 2, y: TABLE.y + TABLE.h / 2 + BALL_R * 2.2 });
    for (const c of candidates){
      if (isCuePlacementLegal(c.x, c.y, 'any')){
        let blocked = false;
        for (const ball of state.balls){
          if (!ball.alive || ball.num === 9) continue;
          if (Math.hypot(ball.x - c.x, ball.y - c.y) < BALL_R * 2 + 1.5){
            blocked = true;
            break;
          }
        }
        if (!blocked){
          nine.x = c.x;
          nine.y = c.y;
          return;
        }
      }
    }
    nine.x = FOOT_X;
    nine.y = TABLE.y + TABLE.h / 2;
  }

  function resetRack(){
    state.balls = [];
    state.cue = makeBall(0, TABLE.x + TABLE.w * 0.18, TABLE.y + TABLE.h / 2);
    state.balls.push(state.cue);

    const spacingX = BALL_R * 2 * 0.92;
    const spacingY = BALL_R * 2 + 1;
    const rackX = FOOT_X;
    const rackY = TABLE.y + TABLE.h / 2;

    const shuffled = [2, 3, 4, 5, 6, 7, 8].sort(() => Math.random() - 0.5);
    const order = [
      [1],
      [shuffled[0], shuffled[1]],
      [shuffled[2], 9, shuffled[3]],
      [shuffled[4], shuffled[5]],
      [shuffled[6]]
    ];

    for (let row = 0; row < order.length; row++){
      const nums = order[row];
      const x = rackX + row * spacingX;
      for (let i = 0; i < nums.length; i++){
        const y = rackY + (i - (nums.length - 1) / 2) * spacingY;
        state.balls.push(makeBall(nums[i], x, y));
      }
    }

    state.currentPlayer = 0;
    state.shotActive = false;
    state.gameOver = false;
    state.winner = null;
    state.breakShot = true;
    local.dragging = false;
    local.pointerId = null;
    local.waitingRemoteAck = false;
    prepareCueInHand('head');
    markDirty();
    updateLabels();
    showBanner('新しいラックをセット', 'warn');
    sendSnapshot(true);
  }

  function resetCueToCenter(){
    prepareCueInHand(state.breakShot ? 'head' : 'any');
    state.shotActive = false;
    local.dragging = false;
    local.pointerId = null;
    local.waitingRemoteAck = false;
    markDirty();
    updateLabels();
    sendSnapshot(true);
  }

  function updateLabels(){
    const targetNum = lowestAliveNumber() || '-';
    const myTurn = isMyTurn();

    turnLabel.textContent = playerName(state.currentPlayer);
    remainLabel.textContent = String(targetNum);
    roleLabel.textContent = roleText();
    phaseLabel.textContent = phaseText();

    hudTarget.textContent = '先球 ' + targetNum;
    hudRule.textContent = state.cueInHandMode === 'any' ? '手球あり' : (state.breakShot ? 'ブレイク' : '9ボール');

    if (state.gameOver){
      const winnerText = playerName(state.winner ?? state.currentPlayer) + 'の勝ち';
      gameStatus.textContent = winnerText;
      hudTurn.textContent = winnerText;
      hudTurn.className = 'pill good';
    } else if (state.shotActive){
      gameStatus.textContent = '球が止まるまで待つ';
      hudTurn.textContent = '移動中';
      hudTurn.className = 'pill';
    } else if (local.waitingRemoteAck){
      gameStatus.textContent = 'ショット送信中';
      hudTurn.textContent = '送信中';
      hudTurn.className = 'pill warn';
    } else if (myTurn){
      if (state.cueInHandMode === 'head'){
        gameStatus.textContent = 'ブレイクショット';
      } else if (state.cueInHandMode === 'any'){
        gameStatus.textContent = '白球を好きな位置に置いてから引っ張る';
      } else {
        gameStatus.textContent = '白球を引っ張って離す';
      }
      hudTurn.textContent = 'あなたの番';
      hudTurn.className = 'pill good';
    } else {
      gameStatus.textContent = '相手の番';
      hudTurn.textContent = '相手の番';
      hudTurn.className = 'pill';
    }

    powerLabel.textContent = state.cueInHandMode === 'any' ? 'BALL IN HAND' : 'POWER';
    renderBallStrip();
  }

  function markDirty(){

    if (isAuthority()) net.dirty = true;
  }

  function serializeSnapshot(){
    return {
      currentPlayer: state.currentPlayer,
      shotActive: state.shotActive,
      gameOver: state.gameOver,
      winner: state.winner,
      breakShot: state.breakShot,
      cueInHandMode: state.cueInHandMode,
      balls: state.balls.map(b => ({
        num: b.num, x: b.x, y: b.y, vx: b.vx, vy: b.vy, r: b.r, alive: b.alive, color: b.color
      }))
    };
  }

  function applySnapshot(data, seq){
    if (typeof seq === 'number' && seq <= net.lastRecvSeq) return;
    if (typeof seq === 'number') net.lastRecvSeq = seq;

    state.currentPlayer = data.currentPlayer;
    state.shotActive = data.shotActive;
    state.gameOver = data.gameOver;
    state.winner = data.winner;
    state.breakShot = !!data.breakShot;
    state.cueInHandMode = data.cueInHandMode ?? null;
    state.balls = data.balls.map(b => ({ ...b }));
    state.cue = state.balls.find(b => b.num === 0) || null;

    if (state.shotActive || !isMyTurn() || state.gameOver) {
      local.dragging = false;
      local.pointerId = null;
    }
    if (state.shotActive || !isMyTurn()) {
      setWaitingRemoteAck(false);
    }
    if (!state.shotActive && isMyTurn()) {
      setWaitingRemoteAck(false);
    }

    updateLabels();
  }

  function send(payload){

    if (net.conn && net.conn.open){
      net.conn.send(payload);
    }
  }

  function sendSnapshot(force=false){
    if (!isHost() || !isOnline()) return;
    if (!force && !net.dirty && !state.shotActive) return;
    net.sendSeq += 1;
    send({ type: 'snapshot', seq: net.sendSeq, data: serializeSnapshot() });
    net.dirty = false;
  }

  function beginShotTracking(){
    shot.startedBy = state.currentPlayer;
    shot.wasBreak = state.breakShot;
    shot.lowestBefore = lowestAliveNumber();
    shot.firstContact = null;
    shot.railAfterContact = false;
    shot.objectRails = new Set();
    shot.pocketed = [];
    shot.cueScratch = false;
    shot.foulReason = '';
  }

  function finishShot(){
    state.shotActive = false;

    if (!shot.firstContact){
      shot.foulReason = '空振り';
    } else if (shot.firstContact !== shot.lowestBefore){
      shot.foulReason = '先球違い';
    } else if (!shot.railAfterContact && !shot.pocketed.some(n => n !== 0)){
      shot.foulReason = 'ノーレール';
    }

    const objectPocketed = shot.pocketed.some(n => n !== 0);
    if (shot.wasBreak && !objectPocketed && shot.objectRails.size < 4){
      shot.foulReason = shot.foulReason || 'ブレイクファウル';
    }

    if (shot.cueScratch){
      shot.foulReason = 'スクラッチ';
    }

    const ninePocketed = shot.pocketed.includes(9);

    if (shot.foulReason){
      if (ninePocketed) spotNineBall();
      state.breakShot = false;
      state.currentPlayer = 1 - shot.startedBy;
      prepareCueInHand('any');
      showToast('ファウル');
      showBanner('ファウル: ' + shot.foulReason + ' / ' + playerName(state.currentPlayer) + 'が手球あり', 'bad');
    } else if (ninePocketed){
      state.breakShot = false;
      state.gameOver = true;
      state.winner = shot.startedBy;
      showToast('9番ポケット');
      showBanner(playerName(shot.startedBy) + 'の勝ち', 'good');
    } else {
      state.breakShot = false;
      state.cueInHandMode = null;
      if (!objectPocketed){
        state.currentPlayer = 1 - shot.startedBy;
        showBanner(playerName(state.currentPlayer) + 'の番', 'warn');
      } else {
        showBanner(playerName(shot.startedBy) + 'が続行', 'good');
      }
    }

    markDirty();
    updateLabels();
    sendSnapshot(true);
  }

  function moveAndWall(ball){
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= FRICTION;
    ball.vy *= FRICTION;

    if (Math.abs(ball.vx) < STOP_EPS) ball.vx = 0;
    if (Math.abs(ball.vy) < STOP_EPS) ball.vy = 0;

    let touchedWall = false;
    if (ball.x - ball.r < TABLE.x){
      ball.x = TABLE.x + ball.r;
      ball.vx = Math.abs(ball.vx) * WALL_RESTITUTION;
      touchedWall = true;
    }
    if (ball.x + ball.r > TABLE.x + TABLE.w){
      ball.x = TABLE.x + TABLE.w - ball.r;
      ball.vx = -Math.abs(ball.vx) * WALL_RESTITUTION;
      touchedWall = true;
    }
    if (ball.y - ball.r < TABLE.y){
      ball.y = TABLE.y + ball.r;
      ball.vy = Math.abs(ball.vy) * WALL_RESTITUTION;
      touchedWall = true;
    }
    if (ball.y + ball.r > TABLE.y + TABLE.h){
      ball.y = TABLE.y + TABLE.h - ball.r;
      ball.vy = -Math.abs(ball.vy) * WALL_RESTITUTION;
      touchedWall = true;
    }

    if (state.shotActive && touchedWall){
      if (ball.num !== 0) shot.objectRails.add(ball.num);
      if (shot.firstContact !== null) shot.railAfterContact = true;
    }
  }

  function checkPockets(ball){
    if (!ball.alive) return false;
    for (const p of pockets){
      const dx = ball.x - p.x;
      const dy = ball.y - p.y;
      const rr = (p.r - ball.r * 0.25);
      if (dx * dx + dy * dy <= rr * rr){
        ball.alive = false;
        ball.vx = 0;
        ball.vy = 0;
        if (state.shotActive){
          shot.pocketed.push(ball.num);
          if (ball.num === 0){
            shot.cueScratch = true;
          } else if (shot.firstContact !== null){
            shot.railAfterContact = true;
          }
        }
        return true;
      }
    }
    return false;
  }

  function resolveBallCollision(a, b){
    if (!a.alive || !b.alive) return false;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    let dist = Math.hypot(dx, dy);
    const minDist = a.r + b.r;
    if (dist >= minDist) return false;

    if (state.shotActive && shot.firstContact == null){
      if (a.num === 0 && b.num !== 0) shot.firstContact = b.num;
      else if (b.num === 0 && a.num !== 0) shot.firstContact = a.num;
    }

    let nx = 1;
    let ny = 0;
    if (dist > 0){
      nx = dx / dist;
      ny = dy / dist;
    } else {
      dist = minDist;
    }

    const overlap = minDist - dist;
    const push = overlap * 0.5 + 0.01;
    a.x -= nx * push;
    a.y -= ny * push;
    b.x += nx * push;
    b.y += ny * push;

    const rvx = b.vx - a.vx;
    const rvy = b.vy - a.vy;
    const velAlongNormal = rvx * nx + rvy * ny;
    if (velAlongNormal > 0) return true;

    const j = -(1 + BALL_RESTITUTION) * velAlongNormal / 2;
    const ix = j * nx;
    const iy = j * ny;
    a.vx -= ix;
    a.vy -= iy;
    b.vx += ix;
    b.vy += iy;
    return true;
  }

  function hostStep(){
    for (const ball of state.balls){
      if (!ball.alive) continue;
      moveAndWall(ball);
    }

    for (let pass = 0; pass < 2; pass++){
      for (let i = 0; i < state.balls.length; i++){
        const a = state.balls[i];
        if (!a.alive) continue;
        for (let j = i + 1; j < state.balls.length; j++){
          const b = state.balls[j];
          if (!b.alive) continue;
          if (resolveBallCollision(a, b)) markDirty();
        }
      }
    }

    let pocketedSomething = false;
    for (const ball of state.balls){
      if (!ball.alive) continue;
      if (checkPockets(ball)) pocketedSomething = true;
    }
    if (pocketedSomething) markDirty();

    const moving = state.balls.some(b => b.alive && (Math.abs(b.vx) > 0 || Math.abs(b.vy) > 0));
    if (moving) markDirty();
    if (state.shotActive && !moving) finishShot();
  }

  function clampPull(dx, dy){

    const len = Math.hypot(dx, dy);
    if (len <= MAX_PULL) return { dx, dy, len };
    const s = MAX_PULL / len;
    return { dx: dx * s, dy: dy * s, len: MAX_PULL };
  }

  function applyShotVector(dx, dy, allowRemote=false, cuePlacement=null){
    const allowed = allowRemote
      ? (!state.gameOver && !state.shotActive && !!state.cue)
      : canShootLocal();
    if (!allowed) return false;

    if (state.cueInHandMode){
      if (cuePlacement){
        if (!tryPlaceCue(cuePlacement, state.cueInHandMode)) return false;
      } else if (!state.cue || !state.cue.alive){
        prepareCueInHand(state.cueInHandMode);
      }
    }
    if (!state.cue || !state.cue.alive) return false;

    const pulled = clampPull(dx, dy);
    if (pulled.len < 6) return false;

    beginShotTracking();
    state.cueInHandMode = null;
    state.cue.vx = pulled.dx * POWER;
    state.cue.vy = pulled.dy * POWER;
    state.shotActive = true;
    local.dragging = false;
    local.pointerId = null;
    local.waitingRemoteAck = false;
    markDirty();
    updateLabels();
    sendSnapshot(true);
    return true;
  }

  function startDrag(point, pointerId){
    if (!canShootLocal()) return;
    if (state.cueInHandMode){
      if (!tryPlaceCue(point, state.cueInHandMode)) return;
      local.dragging = true;
      local.dragPos = point;
      local.pointerId = pointerId;
      return;
    }
    const d = Math.hypot(point.x - state.cue.x, point.y - state.cue.y);
    if (d > state.cue.r + 34) return;
    local.dragging = true;
    local.dragPos = point;
    local.pointerId = pointerId;
  }

  function moveDrag(point, pointerId){
    if (!local.dragging || local.pointerId !== pointerId) return;
    local.dragPos = point;
  }

  function endDrag(point, pointerId){
    if (!local.dragging || local.pointerId !== pointerId) return;
    local.dragging = false;
    local.pointerId = null;
    if (!state.cue || !state.cue.alive) return;

    const dx = state.cue.x - point.x;
    const dy = state.cue.y - point.y;
    const pulled = clampPull(dx, dy);
    if (pulled.len < 6) return;

    if (isAuthority()){
      applyShotVector(pulled.dx, pulled.dy, false, state.cueInHandMode ? { x: state.cue.x, y: state.cue.y } : null);
    } else {
      setWaitingRemoteAck(true);
      updateLabels();
      send({
        type: 'shot',
        dx: pulled.dx,
        dy: pulled.dy,
        cueX: state.cue.x,
        cueY: state.cue.y,
        cueMode: state.cueInHandMode
      });
    }
  }

  function cancelDrag(pointerId){
    if (!local.dragging || (pointerId != null && local.pointerId !== pointerId)) return;
    local.dragging = false;
    local.pointerId = null;
  }

  function setWaitingRemoteAck(value){

    local.waitingRemoteAck = value;
    clearTimeout(setWaitingRemoteAck.timer);
    if (value){
      setWaitingRemoteAck.timer = setTimeout(() => {
        if (!local.waitingRemoteAck) return;
        setWaitingRemoteAck(false);
        if (!isHost() && isOnline()) send({ type: 'needSnapshot' });
        updateLabels();
      }, 1800);
    }
  }

  function roundRect(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function rayCircleIntersection(ox, oy, dx, dy, cx, cy, r){
    const fx = ox - cx;
    const fy = oy - cy;
    const a = dx * dx + dy * dy;
    const b = 2 * (fx * dx + fy * dy);
    const c = fx * fx + fy * fy - r * r;
    const disc = b * b - 4 * a * c;
    if (disc < 0) return null;
    const root = Math.sqrt(disc);
    const t1 = (-b - root) / (2 * a);
    const t2 = (-b + root) / (2 * a);
    if (t1 >= 0) return t1;
    if (t2 >= 0) return t2;
    return null;
  }

  function drawPlacementGuide(){
    if (!state.cueInHandMode || state.gameOver || state.shotActive) return;
    const b = tableBoundsForCue(state.cueInHandMode);
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.18)';
    roundRect(TABLE.x, TABLE.y, TABLE.w, TABLE.h, 12);
    ctx.fill();
    ctx.fillStyle = 'rgba(136,242,181,.13)';
    roundRect(b.minX - BALL_R, b.minY - BALL_R, (b.maxX - b.minX) + BALL_R * 2, (b.maxY - b.minY) + BALL_R * 2, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(136,242,181,.45)';
    ctx.lineWidth = 2;
    roundRect(b.minX - BALL_R, b.minY - BALL_R, (b.maxX - b.minX) + BALL_R * 2, (b.maxY - b.minY) + BALL_R * 2, 12);
    ctx.stroke();
    ctx.restore();
  }

  function drawTargetGuide(){
    if (state.gameOver || !state.cue || !state.cue.alive) return;
    const targetNum = lowestAliveNumber();
    const targetBall = state.balls.find(b => b.alive && b.num === targetNum);
    if (!targetBall) return;

    ctx.save();
    ctx.strokeStyle = 'rgba(255,215,122,.95)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(targetBall.x, targetBall.y, targetBall.r + 7, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = 'rgba(6,14,24,.82)';
    roundRect(targetBall.x + 16, targetBall.y - 28, 56, 24, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,122,.55)';
    ctx.lineWidth = 1.5;
    roundRect(targetBall.x + 16, targetBall.y - 28, 56, 24, 10);
    ctx.stroke();
    ctx.fillStyle = '#ffd77a';
    ctx.font = 'bold 13px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('先球 ' + targetNum, targetBall.x + 44, targetBall.y - 16);

    if (!state.shotActive && isMyTurn()){
      ctx.setLineDash([5, 8]);
      ctx.strokeStyle = 'rgba(255,255,255,.24)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(state.cue.x, state.cue.y);
      ctx.lineTo(targetBall.x, targetBall.y);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  }

  function drawAimGuide(){
    if (!local.dragging || !canShootLocal() || !state.cue || !state.cue.alive) {
      powerFill.style.height = '0%';
      return;
    }

    const dx = state.cue.x - local.dragPos.x;
    const dy = state.cue.y - local.dragPos.y;
    const pulled = clampPull(dx, dy);
    const len = pulled.len;
    const nx = pulled.dx / (len || 1);
    const ny = pulled.dy / (len || 1);
    const tipX = state.cue.x + nx * 190;
    const tipY = state.cue.y + ny * 190;

    powerFill.style.height = Math.round((len / MAX_PULL) * 100) + '%';

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,.58)';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 7]);
    ctx.beginPath();
    ctx.moveTo(state.cue.x, state.cue.y);
    ctx.lineTo(tipX, tipY);
    ctx.stroke();

    const targetNum = lowestAliveNumber();
    const targetBall = state.balls.find(b => b.alive && b.num === targetNum);
    if (targetBall){
      const hit = rayCircleIntersection(state.cue.x, state.cue.y, nx, ny, targetBall.x, targetBall.y, state.cue.r + targetBall.r);
      if (hit != null){
        const hitX = state.cue.x + nx * hit;
        const hitY = state.cue.y + ny * hit;
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(255,255,255,.2)';
        ctx.beginPath();
        ctx.arc(hitX, hitY, state.cue.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,215,122,.85)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(hitX, hitY);
        ctx.lineTo(hitX + nx * 110, hitY + ny * 110);
        ctx.stroke();
      }
    }

    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(143,216,255,.98)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(state.cue.x - nx * 18, state.cue.y - ny * 18);
    ctx.lineTo(state.cue.x - nx * (18 + len), state.cue.y - ny * (18 + len));
    ctx.stroke();
    ctx.restore();
  }

  function draw(){
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setWorldTransform();

    ctx.fillStyle = '#0c1b2a';
    ctx.fillRect(0, 0, WORLD_W, WORLD_H);

    ctx.fillStyle = 'rgba(0,0,0,.18)';
    ctx.fillRect(TABLE.x + 18, TABLE.y + 18, TABLE.w, TABLE.h);

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--wood');
    roundRect(TABLE.x - 36, TABLE.y - 36, TABLE.w + 72, TABLE.h + 72, 28);
    ctx.fill();

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--rail');
    roundRect(TABLE.x - 18, TABLE.y - 18, TABLE.w + 36, TABLE.h + 36, 20);
    ctx.fill();

    const grad = ctx.createLinearGradient(TABLE.x, TABLE.y, TABLE.x, TABLE.y + TABLE.h);
    grad.addColorStop(0, getComputedStyle(document.documentElement).getPropertyValue('--table'));
    grad.addColorStop(1, getComputedStyle(document.documentElement).getPropertyValue('--table2'));
    ctx.fillStyle = grad;
    roundRect(TABLE.x, TABLE.y, TABLE.w, TABLE.h, 12);
    ctx.fill();

    drawPlacementGuide();

    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(HEAD_X, TABLE.y);
    ctx.lineTo(HEAD_X, TABLE.y + TABLE.h);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(HEAD_X, TABLE.y + TABLE.h / 2, 95, Math.PI * 0.5, Math.PI * 1.5);
    ctx.stroke();

    for (const p of pockets){
      ctx.fillStyle = '#081018';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    drawTargetGuide();

    for (const ball of state.balls){
      if (!ball.alive) continue;
      ctx.save();
      ctx.shadowBlur = ball.num === 0 ? 14 : 12;
      ctx.shadowColor = ball.num === 0 ? 'rgba(255,255,255,.35)' : 'rgba(0,0,0,.28)';
      ctx.fillStyle = ball.color;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();

      if (ball.num !== 0){
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r * 0.48, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = ball.num === 8 ? '#ffffff' : '#10243b';
        ctx.font = 'bold 11px Segoe UI, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(ball.num), ball.x, ball.y + 0.5);
      }
      ctx.restore();
    }

    drawAimGuide();
  }

  function bindConn(conn){
    net.conn = conn;

    conn.on('open', () => {
      net.connected = true;
      net.lastRecvSeq = -1;
      setWaitingRemoteAck(false);
      setNetStatus('接続中', 'good');
      if (isHost()){
        markDirty();
        sendSnapshot(true);
        showToast('参加者が入りました');
        showBanner('対戦相手が参加しました', 'good');
      } else {
        showToast('接続しました');
        showBanner('接続完了', 'good');
        send({ type: 'needSnapshot' });
      }
      updateLabels();
    });

    conn.on('data', (msg) => {
      if (!msg || typeof msg !== 'object') return;

      if (msg.type === 'snapshot' && !isHost()){
        applySnapshot(msg.data, msg.seq);
        return;
      }

      if (msg.type === 'needSnapshot' && isHost()){
        sendSnapshot(true);
        return;
      }

      if (msg.type === 'shot' && isHost()){
        if (!canAcceptRemoteShot()){
          sendSnapshot(true);
          return;
        }
        if (!applyShotVector(
          Number(msg.dx) || 0,
          Number(msg.dy) || 0,
          true,
          (msg.cueMode ? { x: Number(msg.cueX) || 0, y: Number(msg.cueY) || 0 } : null)
        )){
          sendSnapshot(true);
        }
        return;
      }

      if (msg.type === 'newgame' && isHost()){
        resetRack();
      }
    });

    conn.on('close', () => {
      net.connected = false;
      local.dragging = false;
      local.pointerId = null;
      setWaitingRemoteAck(false);
      setNetStatus('切断されました', 'bad');
      updateLabels();
    });

    conn.on('error', (err) => {
      console.error(err);
      net.connected = false;
      local.dragging = false;
      local.pointerId = null;
      setWaitingRemoteAck(false);
      setNetStatus('通信エラー', 'bad');
      updateLabels();
    });
  }

  function bindPeer(peer){
    net.peer = peer;

    peer.on('connection', (conn) => {
      if (!isHost()){
        conn.on('open', () => conn.close());
        return;
      }
      if (net.conn && net.conn.open){
        conn.on('open', () => conn.close());
        return;
      }
      bindConn(conn);
    });

    peer.on('error', (err) => {
      console.error(err);
      setNetStatus('接続失敗', 'bad');
    });
  }

  function openPeer(id){
    return new Promise((resolve, reject) => {
      if (typeof Peer === 'undefined'){
        reject(new Error('PeerJS unavailable'));
        return;
      }
      const peer = id ? new Peer(id) : new Peer();
      let finished = false;

      peer.on('open', (peerId) => {
        if (finished) return;
        finished = true;
        bindPeer(peer);
        resolve({ peer, id: peerId });
      });

      peer.on('error', (err) => {
        if (finished) return;
        finished = true;
        reject(err);
      });
    });
  }

  function closeConnection(){
    try { if (net.conn) net.conn.close(); } catch (_) {}
    try { if (net.peer) net.peer.destroy(); } catch (_) {}
    net.mode = 'offline';
    net.side = 0;
    net.peer = null;
    net.conn = null;
    net.connected = false;
    net.roomId = '';
    net.inviteUrl = '';
    net.dirty = false;
    net.sendSeq = 0;
    net.lastRecvSeq = -1;
    inviteInput.value = '';
    setNetStatus('オフライン');
    local.dragging = false;
    local.pointerId = null;
    local.waitingRemoteAck = false;
    updateLabels();
  }

  async function createRoom(){
    closeConnection();
    setNetStatus('部屋作成中');
    try {
      const roomId = randId();
      const opened = await openPeer(roomId);
      net.mode = 'host';
      net.side = 0;
      net.roomId = opened.id;
      net.inviteUrl = buildInviteUrl(opened.id);
      inviteInput.value = net.inviteUrl;
      roomInput.value = net.roomId;
      setNetStatus('待機中', 'good');
      showToast('部屋作成');
      showBanner('招待URLを送ってください', 'warn');
      updateLabels();
    } catch (err){
      console.error(err);
      setNetStatus('部屋作成失敗', 'bad');
    }
  }

  async function joinRoom(){
    const roomId = roomInput.value.trim();
    if (!roomId){
      showToast('部屋IDが必要');
      showBanner('部屋IDを入れてください', 'bad');
      return;
    }

    closeConnection();
    setNetStatus('参加中');

    try {
      const opened = await openPeer('');
      net.mode = 'join';
      net.side = 1;
      net.roomId = roomId;
      net.inviteUrl = buildInviteUrl(roomId);
      inviteInput.value = net.inviteUrl;
      roomInput.value = roomId;
      const conn = opened.peer.connect(roomId, { reliable: true, serialization: 'json' });
      bindConn(conn);
    } catch (err){
      console.error(err);
      setNetStatus('参加失敗', 'bad');
    }
  }

  function copyText(text){
    if (!text) return;
    if (navigator.clipboard && window.isSecureContext){
      navigator.clipboard.writeText(text)
        .then(() => showToast('コピー'))
        .catch(() => showToast('コピー失敗'));
      return;
    }
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      showToast('コピー');
    } catch (_) {
      showToast('コピー失敗');
    }
    ta.remove();
  }

  hostBtn.addEventListener('click', createRoom);
  joinBtn.addEventListener('click', joinRoom);
  copyUrlBtn.addEventListener('click', () => copyText(inviteInput.value));
  copyRoomBtn.addEventListener('click', () => copyText(roomInput.value.trim()));
  disconnectBtn.addEventListener('click', closeConnection);

  newGameBtn.addEventListener('click', () => {
    if (isAuthority()) resetRack();
    else send({ type: 'newgame' });
  });

  canvas.addEventListener('pointerdown', (e) => {
    const p = worldPoint(e.clientX, e.clientY);
    startDrag(p, e.pointerId);
    if (local.dragging){
      canvas.setPointerCapture(e.pointerId);
      e.preventDefault();
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!local.dragging) return;
    moveDrag(worldPoint(e.clientX, e.clientY), e.pointerId);
    e.preventDefault();
  });

  canvas.addEventListener('pointerup', (e) => {
    if (!local.dragging) return;
    endDrag(worldPoint(e.clientX, e.clientY), e.pointerId);
    if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
    e.preventDefault();
  });

  canvas.addEventListener('pointercancel', (e) => {
    cancelDrag(e.pointerId);
    if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
  });

  window.addEventListener('resize', resize);

  function loop(now){
    if (isAuthority()) hostStep();
    draw();

    if (isHost() && isOnline()){
      if (state.shotActive){
        if (!loop.lastSync || now - loop.lastSync >= SYNC_MS){
          loop.lastSync = now;
          sendSnapshot(true);
        }
      } else if (net.dirty) {
        loop.lastSync = now;
        sendSnapshot(true);
      }
    }
    requestAnimationFrame(loop);
  }
  loop.lastSync = 0;

  const roomFromUrl = new URL(location.href).searchParams.get('room');
  if (roomFromUrl) roomInput.value = roomFromUrl;

  resize();
  resetRack();
  updateLabels();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
